<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グランデ 会員ページ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1A6B3C;--green-dark:#0f4526;--green-light:#2a8a52;
    --gold:#D4A820;--gold-light:#f0c840;
    --gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-600:#4b5563;
    --red:#dc2626;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Noto Sans JP',sans-serif;
    background:linear-gradient(160deg,#0a3520 0%,#1A6B3C 50%,#2a8a52 100%);
    min-height:100vh;display:flex;flex-direction:column;
  }

  /* HEADER */
  .header{padding:36px 24px 0;text-align:center;}
  .header-badge{display:inline-block;background:var(--gold);color:var(--green-dark);font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:3px;margin-bottom:14px;}
  .header-title{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:white;letter-spacing:4px;margin-bottom:4px;}
  .header-title span{color:var(--gold);}
  .header-sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:3px;margin-bottom:10px;}
  .header-role{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;font-size:12px;font-weight:700;padding:4px 16px;border-radius:20px;letter-spacing:2px;margin-bottom:10px;}
  .header-msg{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:44px;}

  /* CARDS */
  .cards{display:flex;justify-content:center;gap:28px;padding:0 24px 60px;flex-wrap:wrap;flex:1;align-items:center;}
  .app-card{
    background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
    border-radius:24px;padding:40px 28px 34px;width:260px;text-align:center;
    cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);position:relative;overflow:hidden;
  }
  .app-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;}
  .app-card:hover{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.5);transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,0.3);}
  .app-card:hover::before{opacity:1;}
  .card-icon{font-size:52px;margin-bottom:16px;display:block;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.3));}
  .card-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:white;letter-spacing:2px;margin-bottom:8px;}
  .card-desc{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.8;margin-bottom:22px;}
  .card-btn{display:inline-block;background:white;color:var(--green-dark);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;padding:10px 28px;border-radius:20px;border:none;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(0,0,0,0.2);}
  .card-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,0.25);}
  .card-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--green-dark);}
  .card-free{display:inline-block;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);font-size:11px;padding:3px 10px;border-radius:10px;margin-bottom:16px;}
  .card-lock{display:inline-block;background:rgba(212,168,32,0.2);color:var(--gold);font-size:11px;padding:3px 10px;border-radius:10px;margin-bottom:16px;}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
  .overlay.open{display:flex;}
  .modal{background:white;border-radius:22px;padding:34px 30px;max-width:340px;width:100%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.5);animation:popIn 0.25s ease;}
  @keyframes popIn{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal-icon{font-size:40px;margin-bottom:10px;display:block;}
  .modal-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--green-dark);letter-spacing:1px;margin-bottom:4px;}
  .modal-sub{font-size:12px;color:var(--gray-400);margin-bottom:20px;}
  .modal-input{width:100%;border:2px solid var(--gray-200);border-radius:10px;padding:12px 16px;font-family:'Noto Sans JP',sans-serif;font-size:16px;text-align:center;letter-spacing:3px;margin-bottom:12px;transition:border-color 0.2s;}
  .modal-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,107,60,0.1);}
  .modal-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--green-light));color:white;border:none;border-radius:10px;padding:13px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(26,107,60,0.3);margin-bottom:8px;}
  .modal-btn:hover{transform:translateY(-1px);}
  .modal-cancel{background:none;border:none;color:var(--gray-400);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;padding:6px;}
  .modal-cancel:hover{color:var(--gray-600);}
  .modal-err{color:var(--red);font-size:12px;min-height:16px;margin-bottom:6px;}

  /* GOING */
  .going{display:none;position:fixed;inset:0;background:linear-gradient(135deg,var(--green-dark),var(--green));z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  .going.open{display:flex;}
  .going-icon{font-size:48px;}
  .going-text{font-family:'Oswald',sans-serif;font-size:18px;color:white;letter-spacing:2px;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

  .footer{text-align:center;padding:20px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:2px;}

  @media(max-width:640px){
    .header-title{font-size:24px;}
    .app-card{width:100%;max-width:320px;}
    .cards{gap:16px;}
  }
</style>
</head>
<body>

<div class="going" id="going">
  <div class="going-icon">⚽</div>
  <div class="going-text">移動中...</div>
</div>

<div class="overlay" id="pwOverlay">
  <div class="modal">
    <span class="modal-icon" id="modalIcon"></span>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub">パスワードを入力してください</div>
    <input type="password" class="modal-input" id="pwInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPw()">
    <div class="modal-err" id="pwErr"></div>
    <button class="modal-btn" onclick="checkPw()">開く →</button>
    <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<div class="header">
  <div class="header-badge">GRANDE FC</div>
  <div class="header-title">⚽ <span>GRANDE</span></div>
  <div class="header-sub">MEMBER PAGE</div>
  <div class="header-role">👨‍👩‍👦 会員専用ページ</div>
  <div class="header-msg">グランデFCへようこそ</div>
</div>

<div class="cards">

  <div class="app-card" onclick="openApp('web')">
    <span class="card-icon">🌐</span>
    <div class="card-title">WEBサイト</div>
    <div class="card-free">🔓 パスワード不要</div>
    <div class="card-desc">グランデFC公式サイト<br>お知らせ・スケジュール<br>チーム情報</div>
    <button class="card-btn">開く →</button>
  </div>

  <div class="app-card" onclick="openApp('shokudo')">
    <span class="card-icon">🍜</span>
    <div class="card-title">食育ページ</div>
    <div class="card-lock">🔒 パスワードあり</div>
    <div class="card-desc">お子さんの出席・請求確認<br>杯数ランキング<br>BMI記録の閲覧</div>
    <button class="card-btn gold">開く →</button>
  </div>

</div>

<div class="footer">© GRANDE FC · MEMBER PAGE</div>

<script>
const APPS = {
  web:     { icon:'🌐', title:'WEBサイト',  pw:null,         url:'https://tabatatsu109-netizen.github.io/grandeHP/grande_homepage.html', param:'' },
  shokudo: { icon:'🍜', title:'食育ページ', pw:'g-shokuiku', url:'grande_shokudo_manager.html', param:'?from=member' },
};

let currentApp = null;

function openApp(key) {
  const app = APPS[key];
  if(!app.pw) {
    document.getElementById('going').classList.add('open');
    setTimeout(() => { window.location.href = app.url + app.param; }, 500);
    return;
  }
  currentApp = key;
  document.getElementById('modalIcon').textContent  = app.icon;
  document.getElementById('modalTitle').textContent = app.title;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pwInput').focus(), 100);
}

function checkPw() {
  const app = APPS[currentApp];
  const val = document.getElementById('pwInput').value;
  if(val === app.pw) {
    document.getElementById('pwOverlay').classList.remove('open');
    document.getElementById('going').classList.add('open');
    setTimeout(() => { window.location.href = app.url + app.param; }, 500);
  } else {
    document.getElementById('pwErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function closeModal() {
  document.getElementById('pwOverlay').classList.remove('open');
  currentApp = null;
}

document.getElementById('pwOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('pwOverlay')) closeModal();
});
</script>
</body>
</html>
