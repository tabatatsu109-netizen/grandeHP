<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース管理│GRANDE FC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --green:#1A6B3C; --green-dark:#0F4526; --green-deep:#071A0F;
    --gold:#D4A820; --gold-light:#E8C040;
    --white:#FFFFFF; --off-white:#F4F7FB;
    --gray:#8A9BB0; --text:#0D1B2A; --border:#DDE4EF;
    --red:#C0392B; --red-light:#FDECEA;
  }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--off-white); color:var(--text); min-height:100vh; }

  header { background:var(--green-deep); padding:0 1.2rem; height:56px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); position:sticky; top:0; z-index:100; }
  .header-title { display:flex; align-items:center; gap:10px; }
  .header-title .icon { width:32px; height:32px; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:16px; }
  .header-title h1 { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; color:var(--white); letter-spacing:1px; }
  .header-title h1 span { color:var(--gold); }
  .sync-status { font-size:11px; color:rgba(255,255,255,0.5); display:flex; align-items:center; gap:5px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); }
  .sync-dot.synced { background:#2ECC71; }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .app { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 56px); }
  @media(max-width:768px){ .app{grid-template-columns:1fr;} }

  .sidebar { background:var(--white); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .sidebar-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sidebar-head h2 { font-size:13px; font-weight:700; }
  .btn-add { background:var(--green); color:var(--white); border:none; padding:8px 12px; font-size:13px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .btn-add:hover { background:var(--green-dark); }

  .post-list { flex:1; overflow-y:auto; }
  .post-item { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .post-item:hover { background:var(--off-white); }
  .post-item.active { background:#EEF7F2; border-left:3px solid var(--green); }
  .post-item-cat { font-size:10px; font-weight:700; letter-spacing:1px; color:var(--green); font-family:'Barlow Condensed',sans-serif; margin-bottom:2px; }
  .post-item-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; line-height:1.4; }
  .post-item-date { font-size:11px; color:var(--gray); }
  .empty-list { padding:32px 14px; text-align:center; color:var(--gray); font-size:13px; }

  .main { display:flex; flex-direction:column; overflow:hidden; }
  .form-panel { flex:1; padding:20px 24px; overflow-y:auto; display:none; }
  .form-panel.show { display:block; }
  @media(max-width:768px){ .form-panel{ padding:14px 16px; } }
  .form-panel-title { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:var(--text); margin-bottom:2px; }
  .form-panel-sub { font-size:12px; color:var(--gray); margin-bottom:18px; }

  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:11px; font-weight:700; color:var(--gray); margin-bottom:4px; letter-spacing:0.5px; }
  .form-label .req { color:var(--gold); }
  .form-input, .form-select, .form-textarea {
    width:100%; padding:11px 12px;
    border:1px solid var(--border); background:var(--white);
    color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:15px;
    outline:none; transition:border-color 0.2s; border-radius:0; appearance:none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--green); }
  .form-textarea { min-height:160px; resize:vertical; line-height:1.8; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:600px){ .form-row{grid-template-columns:1fr;} }

  /* テンプレートセクション */
  .tmpl-section { background:#F0F7F3; border:1px solid #C8E6D4; padding:16px; margin-bottom:18px; border-radius:0; }
  .tmpl-title { font-size:13px; font-weight:700; color:var(--green); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .tmpl-input { padding:11px 12px; border:1px solid #C8E6D4; background:var(--white); font-size:15px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; border-radius:0; }
  .tmpl-input:focus { border-color:var(--green); }
  .tmpl-select { padding:11px 12px; border:1px solid #C8E6D4; background:var(--white); font-size:15px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; border-radius:0; appearance:none; }
  .tmpl-select:focus { border-color:var(--green); }
  .tmpl-textarea { padding:11px 12px; border:1px solid #C8E6D4; background:var(--white); font-size:15px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; min-height:80px; resize:vertical; border-radius:0; line-height:1.7; }
  .tmpl-textarea:focus { border-color:var(--green); }
  .tmpl-group { margin-bottom:10px; }
  .tmpl-label { display:block; font-size:11px; font-weight:700; color:var(--gray); margin-bottom:4px; }
  .tmpl-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  @media(max-width:600px){ .tmpl-row{ grid-template-columns:1fr; } }

  .btn-gen { background:var(--green); color:var(--white); border:none; padding:13px 20px; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; width:100%; margin-top:6px; transition:all 0.2s; }
  .btn-gen:hover { background:var(--green-dark); }
  .btn-gen:active { transform:scale(0.98); }

  .form-actions { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
  .btn-save { background:var(--green); color:var(--white); border:none; padding:13px 24px; font-size:14px; font-weight:900; font-family:'Noto Sans JP',sans-serif; cursor:pointer; clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%); }
  .btn-save:hover { background:var(--green-dark); }
  .btn-cancel { background:none; color:var(--gray); border:1px solid var(--border); padding:13px 16px; font-size:14px; font-weight:500; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .btn-delete { background:none; color:var(--red); border:1px solid var(--red); padding:13px 16px; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-left:auto; }
  .btn-delete:hover { background:var(--red-light); }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; color:var(--gray); }
  .empty-state .big-icon { font-size:56px; margin-bottom:14px; opacity:0.4; }
  .empty-state h3 { font-size:17px; font-weight:700; color:var(--text); margin-bottom:5px; }

  .preview-box { background:var(--off-white); border:1px solid var(--border); padding:14px; margin-top:14px; border-left:3px solid var(--gold); }
  .preview-box-title { font-size:10px; font-weight:700; color:var(--gold); letter-spacing:2px; margin-bottom:6px; font-family:'Barlow Condensed',sans-serif; }
  .preview-content { font-size:13px; color:var(--text); line-height:1.9; white-space:pre-wrap; }

  .toast { position:fixed; bottom:20px; right:16px; z-index:999; background:var(--green-deep); color:var(--white); padding:10px 16px; font-size:13px; font-weight:700; border-left:3px solid var(--gold); transform:translateY(80px); opacity:0; transition:all 0.3s ease; pointer-events:none; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { border-left-color:var(--red); }

  .loading-overlay { position:fixed; inset:0; background:rgba(7,26,15,0.7); display:none; align-items:center; justify-content:center; z-index:200; flex-direction:column; gap:12px; }
  .loading-overlay.show { display:flex; }
  .spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { color:var(--white); font-size:13px; }

  .pw-screen { position:fixed; inset:0; z-index:999; background:var(--green-deep); display:flex; align-items:center; justify-content:center; padding:24px; }
  .pw-card { background:rgba(255,255,255,0.04); border:1px solid rgba(212,168,32,0.2); width:100%; max-width:340px; padding:32px 24px; }
  .pw-icon { font-size:36px; text-align:center; margin-bottom:12px; }
  .pw-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; color:var(--white); text-align:center; margin-bottom:18px; }
  .pw-title span { color:var(--gold); }
  .pw-input { width:100%; padding:12px 13px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:var(--white); font-size:16px; font-family:'Noto Sans JP',sans-serif; outline:none; margin-bottom:10px; border-radius:0; }
  .pw-input:focus { border-color:var(--gold); }
  .pw-input.shake { animation:shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .pw-error { font-size:12px; color:#FF8A8A; min-height:16px; margin-bottom:12px; }
  .pw-btn { width:100%; padding:13px; background:var(--gold); color:var(--green-deep); border:none; font-size:14px; font-weight:900; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .pw-btn:hover { background:var(--gold-light); }
</style>
</head>
<body>

<div class="pw-screen" id="pwScreen">
  <div class="pw-card">
    <div class="pw-icon">📰</div>
    <div class="pw-title">ニュース管理 <span>GRANDE</span></div>
    <input class="pw-input" type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" onclick="checkPw()">ログイン →</button>
  </div>
</div>

<header>
  <div class="header-title">
    <div class="icon">📰</div>
    <h1>ニュース管理 <span>GRANDE FC</span></h1>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">接続中...</span>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>投稿一覧</h2>
      <button class="btn-add" onclick="newPost()">＋ 新規投稿</button>
    </div>
    <div class="post-list" id="postList"></div>
  </div>

  <div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">📝</div>
      <h3>投稿を選択または新規作成</h3>
      <p style="font-size:13px;">左のリストから投稿を選ぶか、<br>「＋ 新規投稿」ボタンで作成してください。</p>
    </div>

    <div class="form-panel" id="formPanel">
      <div class="form-panel-title" id="formTitle">新規投稿</div>
      <div class="form-panel-sub">投稿情報を入力してください</div>

      <!-- ⚽ 試合結果テンプレート -->
      <div class="tmpl-section">
        <div class="tmpl-title">⚽ 試合結果を入力して記事を生成</div>

        <div class="tmpl-row">
          <div class="tmpl-group">
            <label class="tmpl-label">カテゴリー</label>
            <select class="tmpl-select" id="t_category" onchange="updateTournamentList()">
              <option value="ジュニアユース">ジュニアユース</option>
              <option value="ジュニア">ジュニア</option>
            </select>
          </div>
          <div class="tmpl-group">
            <label class="tmpl-label">大会名</label>
            <select class="tmpl-select" id="t_tournament_select" onchange="onTournamentSelect()">
              <option value="">選択してください</option>
              <option value="U-15リーグ">U-15リーグ</option>
              <option value="U-13リーグ">U-13リーグ</option>
              <option value="高円ウイナーズカップ">高円ウイナーズカップ</option>
              <option value="クラブユース新人戦">クラブユース新人戦</option>
              <option value="クラブユース選手権">クラブユース選手権</option>
              <option value="クラブカップU-15">クラブカップU-15</option>
              <option value="練習試合">練習試合</option>
              <option value="__other__">その他（直接入力）</option>
            </select>
          </div>
        </div>
        <div class="tmpl-group" id="t_tournament_input_group" style="display:none;">
          <label class="tmpl-label">大会名を入力</label>
          <input class="tmpl-input" type="text" id="t_tournament" placeholder="大会名を入力してください">
        </div>

        <div class="tmpl-row">
          <div class="tmpl-group">
            <label class="tmpl-label">対戦相手</label>
            <input class="tmpl-input" type="text" id="t_opponent" placeholder="例：FC八ヶ岳">
          </div>
          <div class="tmpl-group">
            <label class="tmpl-label">スコア</label>
            <input class="tmpl-input" type="text" id="t_score" placeholder="例：3-1">
          </div>
        </div>

        <div class="tmpl-group">
          <label class="tmpl-label">得点者（任意）</label>
          <input class="tmpl-input" type="text" id="t_scorer" placeholder="例：山田・鈴木（2）">
        </div>

        <div class="tmpl-group">
          <label class="tmpl-label">コーチコメント（任意）</label>
          <textarea class="tmpl-textarea" id="t_comment" placeholder="例：最後まであきらめずに戦えた試合でした。"></textarea>
        </div>

        <button class="btn-gen" onclick="generateTemplate()">📄 記事を生成する</button>
      </div>

      <!-- カテゴリー・日付 -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">カテゴリー <span class="req">必須</span></label>
          <select class="form-select" id="fCat">
            <option value="">選択してください</option>
            <option value="ジュニアユース">ジュニアユース</option>
            <option value="ジュニア">ジュニア</option>
            <option value="スクール">スクール</option>
            <option value="グランデ食堂">グランデ食堂</option>
            <option value="巡回サッカー">巡回サッカー</option>
            <option value="イベント">イベント</option>
            <option value="お知らせ">お知らせ</option>
            <option value="選手募集">選手募集</option>
            <option value="クラブニュース">クラブニュース</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">日付 <span class="req">必須</span></label>
          <input class="form-input" type="date" id="fDate">
        </div>
      </div>

      <!-- タイトル -->
      <div class="form-group">
        <label class="form-label">タイトル <span class="req">必須</span></label>
        <input class="form-input" type="text" id="fTitle" placeholder="例：ツルカップ 3-1勝利！">
      </div>

      <!-- 画像URL -->
      <div class="form-group">
        <label class="form-label">画像URL（Googleドライブのリンク）</label>
        <input class="form-input" type="text" id="fImage" placeholder="https://drive.google.com/file/d/..." oninput="onImageInput(this.value)">
        <div id="imagePreview" style="display:none; margin-top:8px;">
          <img id="imagePreviewImg" src="" alt="" style="max-width:100%; max-height:200px; object-fit:cover;">
        </div>
      </div>

      <!-- 本文 -->
      <div class="form-group">
        <label class="form-label">本文</label>
        <textarea class="form-textarea" id="fBody" placeholder="本文を入力、または上の「記事を生成する」で自動作成できます。"></textarea>
      </div>

      <div class="preview-box" id="previewBox" style="display:none;">
        <div class="preview-box-title">PREVIEW</div>
        <div class="preview-content" id="previewContent"></div>
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="savePost()">公開する</button>
        <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
        <button class="btn-delete" id="btnDelete" onclick="deletePost()" style="display:none;">削除</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">保存中...</div>
</div>

<script>
const API_KEY  = '$2a$10$fMVrBXjLBMllbrm18CDXy.ELqnMQmZbg65x13ZhaU55B/4Tuq4Ina';
const NEWS_BIN = '6a1ed74af5f4af5e29ad180b';

let posts = [];
let matches = [];
let editingId = null;

// ===== パスワード =====
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === 'tatti109') {
    document.getElementById('pwScreen').style.display = 'none';
    sessionStorage.setItem('grande_news_auth', '1');
    initApp();
  } else {
    document.getElementById('pwError').textContent = 'パスワードが違います';
    const inp = document.getElementById('pwInput');
    inp.classList.add('shake'); inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}
if (sessionStorage.getItem('grande_news_auth') === '1') {
  document.getElementById('pwScreen').style.display = 'none';
  initApp();
}

// ===== 初期化 =====
async function initApp() {
  setSyncStatus('syncing', '接続中...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${NEWS_BIN}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await res.json();
    posts = json.record.posts || [];
    matches = json.record.matches || [];
    renderList();
    setSyncStatus('synced', '同期済み');
  } catch(e) {
    setSyncStatus('error', 'エラー');
    showToast('接続に失敗しました', true);
  }
}

async function savePosts() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${NEWS_BIN}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
    body: JSON.stringify({ posts, matches })
  });
  if (!res.ok) throw new Error('Save failed');
}

function renderList() {
  const list = document.getElementById('postList');
  if (!posts.length) { list.innerHTML = '<div class="empty-list">投稿がありません</div>'; return; }
  const sorted = [...posts].sort((a,b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = sorted.map(p => `
    <div class="post-item ${editingId === p.id ? 'active' : ''}" onclick="editPost('${p.id}')">
      <div class="post-item-cat">${p.category || ''}</div>
      <div class="post-item-title">${p.title || '（タイトルなし）'}</div>
      <div class="post-item-date">${formatDate(p.date)}</div>
    </div>
  `).join('');
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ===== 大会名リスト切替 =====
const TOURNAMENT_LISTS = {
  'ジュニアユース': [
    'U-15リーグ','U-13リーグ','高円ウイナーズカップ',
    'クラブユース新人戦','クラブユース選手権','クラブカップU-15','練習試合'
  ],
  'ジュニア': [
    'U-12リーグ','nanaho Cup','バーモントカップ',
    '全日本U-12サッカー選手権大会','ニッサングリーンカップ',
    '内藤ハウスカップ','全農杯','練習試合'
  ]
};

function updateTournamentList() {
  const cat = document.getElementById('t_category').value;
  const sel = document.getElementById('t_tournament_select');
  const list = TOURNAMENT_LISTS[cat] || [];
  sel.innerHTML = '<option value="">選択してください</option>'
    + list.map(t => `<option value="${t}">${t}</option>`).join('')
    + '<option value="__other__">その他（直接入力）</option>';
  document.getElementById('t_tournament_input_group').style.display = 'none';
  document.getElementById('t_tournament').value = '';
}

function onTournamentSelect() {
  const val = document.getElementById('t_tournament_select').value;
  const inputGroup = document.getElementById('t_tournament_input_group');
  if (val === '__other__') {
    inputGroup.style.display = 'block';
    document.getElementById('t_tournament').value = '';
    document.getElementById('t_tournament').focus();
  } else {
    inputGroup.style.display = 'none';
  }
}

// ===== テンプレート生成 =====
function generateTemplate() {
  const tournamentSelect = document.getElementById('t_tournament_select').value;
  const tournament = tournamentSelect === '__other__' || tournamentSelect === ''
    ? document.getElementById('t_tournament').value.trim()
    : tournamentSelect;
  const category   = document.getElementById('t_category').value;
  const opponent   = document.getElementById('t_opponent').value.trim();
  const score      = document.getElementById('t_score').value.trim();
  const scorer     = document.getElementById('t_scorer').value.trim();
  const comment    = document.getElementById('t_comment').value.trim();

  if (!opponent) { showToast('対戦相手を入力してください', true); return; }
  if (!score)    { showToast('スコアを入力してください', true); return; }

  // 勝敗判定
  const parts = score.split('-');
  const a = parseInt(parts[0]), b = parseInt(parts[1]);
  let resultWord = '引き分け';
  let resultVerb = '引き分けました';
  if (!isNaN(a) && !isNaN(b)) {
    if (a > b) { resultWord = '勝利'; resultVerb = '勝利しました'; }
    else if (a < b) { resultWord = '敗戦'; resultVerb = '敗れました'; }
  }

  // タイトル
  const title = `【${tournament || '試合'}】 GRANDE FC ${category} ${score} ${opponent}`;

  // 本文
  const p1 = `本日は${tournament ? tournament + 'が' : '試合が'}行われ、${category}は${opponent}と対戦し、${score}で${resultVerb}。`;
  const p2 = comment || '';
  const p3 = `対戦していただいた${opponent}の皆様、応援していただいた保護者の皆様、ありがとうございました。`;

  // 箇条書きサマリー
  const summaryLines = [
    `・大会名：${tournament || '試合'}`,
    `・GRANDE FC ${category} ${score} ${opponent}`,
  ];
  if (scorer) summaryLines.push(`・得点者：${scorer}`);
  const summary = summaryLines.join('\n');

  const body = [p1, p2, p3, summary].filter(Boolean).join('\n\n');

  // 試合データを保存
  const matchData = {
    id: 'match_' + Date.now(),
    date: document.getElementById('fDate').value || new Date().toISOString().split('T')[0],
    category,
    tournament: tournament || '試合',
    opponent,
    score,
    result: resultWord,
    goalsFor: a || 0,
    goalsAgainst: b || 0,
    scorer: scorer || '',
    comment: comment || '',
    createdAt: new Date().toISOString()
  };
  matches.push(matchData);

  // フォームに反映
  document.getElementById('fTitle').value = title;
  document.getElementById('fBody').value  = body;
  document.getElementById('fCat').value   = category;
  document.getElementById('previewContent').textContent = body;
  document.getElementById('previewBox').style.display = 'block';

  showToast('記事を生成しました！');
}

// ===== 新規 =====
function newPost() {
  editingId = null;
  document.getElementById('fCat').value   = '';
  document.getElementById('fDate').value  = new Date().toISOString().split('T')[0];
  document.getElementById('fTitle').value = '';
  document.getElementById('fBody').value  = '';
  document.getElementById('fImage').value = '';
  document.getElementById('t_tournament_select').value = '';
  document.getElementById('t_tournament').value = '';
  document.getElementById('t_tournament_input_group').style.display = 'none';
  document.getElementById('t_opponent').value   = '';
  document.getElementById('t_score').value      = '';
  document.getElementById('t_scorer').value    = '';
  document.getElementById('t_comment').value    = '';
  document.getElementById('imagePreview').style.display  = 'none';
  document.getElementById('previewBox').style.display    = 'none';
  document.getElementById('btnDelete').style.display     = 'none';
  document.getElementById('formTitle').textContent       = '新規投稿';
  document.getElementById('emptyState').style.display    = 'none';
  document.getElementById('formPanel').classList.add('show');
}

// ===== 編集 =====
function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('fCat').value   = p.category || '';
  document.getElementById('fDate').value  = p.date || '';
  document.getElementById('fTitle').value = p.title || '';
  document.getElementById('fBody').value  = p.body || '';
  document.getElementById('fImage').value = p.image || '';
  if (p.image) {
    document.getElementById('imagePreviewImg').src = p.image;
    document.getElementById('imagePreview').style.display = 'block';
  } else {
    document.getElementById('imagePreview').style.display = 'none';
  }
  document.getElementById('formTitle').textContent = p.title || '編集';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('previewBox').style.display = p.body ? 'block' : 'none';
  document.getElementById('previewContent').textContent = p.body || '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('formPanel').classList.add('show');
  renderList();
}

// ===== 保存 =====
async function savePost() {
  const title = document.getElementById('fTitle').value.trim();
  const cat   = document.getElementById('fCat').value;
  const date  = document.getElementById('fDate').value;
  if (!title) { showToast('タイトルを入力してください', true); return; }
  if (!cat)   { showToast('カテゴリーを選択してください', true); return; }
  if (!date)  { showToast('日付を入力してください', true); return; }

  const rawImageUrl = document.getElementById('fImage').value.trim();
  const convertedImage = rawImageUrl ? convertDriveUrl(rawImageUrl) : null;

  const postData = {
    id: editingId || 'post_' + Date.now(),
    title, category: cat, date,
    body: document.getElementById('fBody').value.trim(),
    image: convertedImage,
    updatedAt: new Date().toISOString()
  };

  showLoading('保存中...');
  setSyncStatus('syncing', '保存中...');
  try {
    if (editingId) {
      const idx = posts.findIndex(p => p.id === editingId);
      if (idx !== -1) posts[idx] = postData;
    } else {
      posts.unshift(postData);
    }
    await savePosts();
    editingId = postData.id;
    renderList();
    setSyncStatus('synced', '同期済み');
    showToast('公開しました！');
    document.getElementById('formTitle').textContent = postData.title;
    document.getElementById('btnDelete').style.display = 'block';
  } catch(e) {
    showToast('保存に失敗しました', true);
    setSyncStatus('error', 'エラー');
  } finally {
    hideLoading();
  }
}

// ===== 削除 =====
async function deletePost() {
  if (!editingId) return;
  const p = posts.find(x => x.id === editingId);
  if (!confirm(`「${p?.title || '投稿'}」を削除しますか？`)) return;
  showLoading('削除中...');
  try {
    posts = posts.filter(x => x.id !== editingId);
    await savePosts();
    showToast('削除しました');
    closeForm();
    renderList();
  } catch(e) {
    showToast('削除に失敗しました', true);
  } finally {
    hideLoading();
  }
}

function closeForm() {
  editingId = null;
  document.getElementById('formPanel').classList.remove('show');
  document.getElementById('emptyState').style.display = 'flex';
  renderList();
}

function convertDriveUrl(url) {
  if (!url) return null;
  const m1 = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m1) return 'https://lh3.googleusercontent.com/d/' + m1[1];
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  if (url.startsWith('http')) return url;
  return null;
}

function onImageInput(val) {
  const converted = convertDriveUrl(val.trim());
  if (converted) {
    document.getElementById('imagePreviewImg').src = converted;
    document.getElementById('imagePreview').style.display = 'block';
  } else {
    document.getElementById('imagePreview').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const bodyInput = document.getElementById('fBody');
  if (bodyInput) {
    bodyInput.addEventListener('input', () => {
      const val = bodyInput.value;
      if (val) {
        document.getElementById('previewContent').textContent = val;
        document.getElementById('previewBox').style.display = 'block';
      } else {
        document.getElementById('previewBox').style.display = 'none';
      }
    });
  }
});

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + (state === 'synced' ? 'synced' : state === 'syncing' ? 'syncing' : '');
  document.getElementById('syncText').textContent = text;
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoading(msg='処理中...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
</script>
