<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRANDE FC ヒーロー差し替えプレビュー</title>
<style>
/* ============================================================
   ▼▼▼ ここから下が「ヒーローエリア」用CSS（既存サイトに追加） ▼▼▼
   ※ クラス名はすべて ghero- で始まるので既存CSSと衝突しません
   ============================================================ */

:root{
  --grande-green:#1A6B3C;
  --grande-green-dark:#0F4727;
  --grande-gold:#D4A820;
}

.ghero{
  position:relative;
  min-height:100svh;              /* ファーストビューいっぱいに大きく表示 */
  min-height:100vh;               /* svh非対応ブラウザ用フォールバック */
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6rem 5vw 5rem;
  box-sizing:border-box;
  overflow:hidden;
  color:#fff;

  /* ▼ 背景：上から「暗いオーバーレイ」→「写真」→「予備の背景」の3層 ▼
     本番では images/hero.jpg が表示されます。
     写真が無い時だけ、いちばん下の予備グラデーション/イラストが出ます。 */
  background-image:
    linear-gradient(180deg, rgba(10,40,24,.55) 0%, rgba(10,30,18,.62) 55%, rgba(8,25,15,.80) 100%),
    url('images/hero.jpg'),
    url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><defs><linearGradient id="s" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23173d56"/><stop offset="0.45" stop-color="%231f6e7d"/></linearGradient><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%231A6B3C"/><stop offset="1" stop-color="%230F4727"/></linearGradient></defs><rect width="1200" height="800" fill="url(%23s)"/><path d="M0 430 L210 300 L360 410 L520 250 L700 420 L860 300 L1040 430 L1200 350 L1200 520 L0 520 Z" fill="%23123a2a" opacity="0.85"/><rect y="470" width="1200" height="330" fill="url(%23g)"/></svg>');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.ghero__inner{
  position:relative;
  z-index:2;
  max-width:960px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.1rem;
}

/* バッジ：体験練習受付中 */
.ghero__badge{
  display:inline-flex;
  align-items:center;
  gap:.5em;
  padding:.45em 1.2em;
  font-size:clamp(.72rem,2.6vw,.85rem);
  font-weight:700;
  letter-spacing:.12em;
  color:var(--grande-gold);
  border:1px solid var(--grande-gold);
  border-radius:999px;
  background:rgba(0,0,0,.22);
  backdrop-filter:blur(2px);
}
.ghero__badge::before{
  content:"";
  width:.5em;height:.5em;border-radius:50%;
  background:var(--grande-gold);
  box-shadow:0 0 0 4px rgba(212,168,32,.25);
}

/* ② メインコピー：必ず一行で表示（PC・スマホとも） */
.ghero__title{
  white-space:nowrap;                       /* 改行させない */
  font-size:clamp(1.7rem, 6.2vw, 3.6rem);   /* 画面幅に応じて自動縮小→はみ出さない */
  line-height:1.15;
  font-weight:800;
  letter-spacing:.04em;
  margin:.2rem 0 0;
  text-shadow:0 2px 16px rgba(0,0,0,.45);
}

.ghero__sub{
  font-size:clamp(.78rem,3vw,1rem);
  font-weight:600;
  letter-spacing:.28em;
  color:var(--grande-gold);
  margin:0;
}

.ghero__lead{
  font-size:clamp(.85rem,3.4vw,1.05rem);
  line-height:1.9;
  font-weight:500;
  color:rgba(255,255,255,.92);
  margin:.3rem 0 0;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
}

/* ボタン（既存の雰囲気を維持：ゴールド主役＋アウトライン） */
.ghero__actions{
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  justify-content:center;
  margin-top:1.4rem;
}
.ghero__btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:170px;
  padding:.95em 2em;
  font-size:clamp(.9rem,3.2vw,1rem);
  font-weight:700;
  letter-spacing:.05em;
  border-radius:8px;
  text-decoration:none;
  transition:transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
}
.ghero__btn--primary{
  background:var(--grande-gold);
  color:#1d1402;
  box-shadow:0 8px 24px rgba(212,168,32,.35);
}
.ghero__btn--primary:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(212,168,32,.5);
}
.ghero__btn--ghost{
  background:rgba(255,255,255,.06);
  color:#fff;
  border:1.5px solid rgba(255,255,255,.8);
  backdrop-filter:blur(2px);
}
.ghero__btn--ghost:hover{
  transform:translateY(-2px);
  background:#fff;
  color:var(--grande-green-dark);
}

/* SCROLL インジケーター */
.ghero__scroll{
  position:absolute;
  left:50%;bottom:1.6rem;
  transform:translateX(-50%);
  z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  font-size:.65rem;letter-spacing:.3em;font-weight:700;
  color:rgba(255,255,255,.8);
}
.ghero__scroll span{writing-mode:horizontal-tb;}
.ghero__scroll::after{
  content:"";
  width:1px;height:42px;
  background:linear-gradient(var(--grande-gold),transparent);
  animation:gheroScroll 1.8s ease-in-out infinite;
}
@keyframes gheroScroll{
  0%{transform:scaleY(.3);transform-origin:top;opacity:.4}
  50%{transform:scaleY(1);opacity:1}
  100%{transform:scaleY(.3);transform-origin:bottom;opacity:.4}
}

@media (prefers-reduced-motion:reduce){
  .ghero__scroll::after{animation:none}
}

/* ============================================================
   ▲▲▲ ヒーロー用CSS ここまで ▲▲▲
   ============================================================ */

/* （プレビュー用の最低限のリセット。既存サイトには不要） */
*{margin:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#0F4727;}
</style>
</head>
<body>

<!-- ============================================================
     ▼▼▼ ここから下が「ヒーローエリア」のHTML（既存の <section> と差し替え） ▼▼▼
     ============================================================ -->
<section class="ghero">
  <div class="ghero__inner">
    <span class="ghero__badge">体験練習受付中</span>

    <!-- ② メインコピー（1行表示） -->
    <h1 class="ghero__title">感動するサッカーの追求</h1>

    <p class="ghero__sub">YATSUGATAKE GRANDE FC</p>

    <p class="ghero__lead">
      夢に向かって努力できる子供に。<br>
      北杜市を拠点に活動するジュニア・ジュニアユースクラブ。
    </p>

    <div class="ghero__actions">
      <a class="ghero__btn ghero__btn--primary" href="grande_recruit.html">選手募集</a>
      <a class="ghero__btn ghero__btn--ghost" href="grande_about.html">クラブ紹介</a>
    </div>
  </div>

  <div class="ghero__scroll"><span>SCROLL</span></div>
</section>
<!-- ============================================================
     ▲▲▲ ヒーローエリアのHTML ここまで ▲▲▲
     ============================================================ -->

</body>
</html>
