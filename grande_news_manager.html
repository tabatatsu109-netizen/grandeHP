<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース管理│GRANDE FC</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --green:#1A6B3C; --green-dark:#0F4526; --green-deep:#071A0F;
    --gold:#D4A820; --gold-light:#E8C040;
    --white:#FFFFFF; --off-white:#F4F7FB;
    --gray:#8A9BB0; --text:#0D1B2A; --border:#DDE4EF;
    --red:#C0392B; --red-light:#FDECEA;
  }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--off-white); color:var(--text); min-height:100vh; }

  header { background:var(--green-deep); padding:0 1.2rem; height:56px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); position:sticky; top:0; z-index:100; }
  .header-title { display:flex; align-items:center; gap:10px; }
  .header-title .icon { width:32px; height:32px; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:16px; }
  .header-title h1 { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; color:var(--white); letter-spacing:1px; }
  .header-title h1 span { color:var(--gold); }
  .sync-status { font-size:11px; color:rgba(255,255,255,0.5); display:flex; align-items:center; gap:5px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); }
  .sync-dot.synced { background:#2ECC71; }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .app { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 56px); }
  @media(max-width:768px){ .app{grid-template-columns:1fr;} }

  .sidebar { background:var(--white); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .sidebar-head { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sidebar-head h2 { font-size:13px; font-weight:700; }
  .btn-add { background:var(--green); color:var(--white); border:none; padding:8px 12px; font-size:13px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .btn-add:hover { background:var(--green-dark); }

  .post-list { flex:1; overflow-y:auto; }
  .post-item { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; }
  .post-item:hover { background:var(--off-white); }
  .post-item.active { background:#EEF7F2; border-left:3px solid var(--green); }
  .post-item-cat { font-size:10px; font-weight:700; letter-spacing:1px; color:var(--green); font-family:'Barlow Condensed',sans-serif; margin-bottom:2px; }
  .post-item-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; line-height:1.4; }
  .post-item-date { font-size:11px; color:var(--gray); }
  .empty-list { padding:32px 14px; text-align:center; color:var(--gray); font-size:13px; }

  .main { display:flex; flex-direction:column; overflow:hidden; }
  .form-panel { flex:1; padding:20px 24px; overflow-y:auto; display:none; }
  .form-panel.show { display:block; }
  @media(max-width:768px){ .form-panel{ padding:16px; } }
  .form-panel-title { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:var(--text); margin-bottom:2px; }
  .form-panel-sub { font-size:12px; color:var(--gray); margin-bottom:18px; }

  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:11px; font-weight:700; color:var(--gray); margin-bottom:4px; letter-spacing:0.5px; }
  .form-label .req { color:var(--gold); }
  .form-input, .form-select, .form-textarea {
    width:100%; padding:10px 12px;
    border:1px solid var(--border); background:var(--white);
    color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px;
    outline:none; transition:border-color 0.2s; border-radius:0; appearance:none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--green); }
  .form-textarea { min-height:180px; resize:vertical; line-height:1.8; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:600px){ .form-row{grid-template-columns:1fr;} }

  /* テンプレートセクション */
  .tmpl-section { background:#F0F7F3; border:1px solid #C8E6D4; padding:14px; margin-bottom:16px; }
  .tmpl-title { font-size:13px; font-weight:700; color:var(--green); margin-bottom:10px; }
  .tmpl-form { display:none; }
  .tmpl-form.active { display:block; }
  .tmpl-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  @media(max-width:600px){ .tmpl-row{grid-template-columns:1fr;} }
  .tmpl-input { padding:9px 10px; border:1px solid #C8E6D4; background:var(--white); font-size:13px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; border-radius:0; }
  .tmpl-input:focus { border-color:var(--green); }
  .tmpl-select { padding:9px 10px; border:1px solid #C8E6D4; background:var(--white); font-size:13px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; border-radius:0; appearance:none; }
  .tmpl-textarea { padding:9px 10px; border:1px solid #C8E6D4; background:var(--white); font-size:13px; font-family:'Noto Sans JP',sans-serif; outline:none; width:100%; min-height:72px; resize:vertical; margin-bottom:8px; border-radius:0; }
  .tmpl-textarea:focus, .tmpl-select:focus { border-color:var(--green); }

  /* テーマチェックボックス */
  .theme-checks { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .theme-check { display:none; }
  .theme-label { display:inline-block; padding:5px 10px; border:1px solid #C8E6D4; background:var(--white); font-size:12px; cursor:pointer; user-select:none; transition:all 0.15s; }
  .theme-check:checked + .theme-label { background:var(--green); color:var(--white); border-color:var(--green); }

  .btn-gen { background:var(--green); color:var(--white); border:none; padding:11px 20px; font-size:13px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all 0.2s; width:100%; justify-content:center; margin-top:4px; }
  .btn-gen:hover { background:var(--green-dark); }
  .btn-gen:active { transform:scale(0.98); }

  .form-actions { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
  .btn-save { background:var(--green); color:var(--white); border:none; padding:12px 24px; font-size:14px; font-weight:900; font-family:'Noto Sans JP',sans-serif; cursor:pointer; clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%); }
  .btn-save:hover { background:var(--green-dark); }
  .btn-cancel { background:none; color:var(--gray); border:1px solid var(--border); padding:12px 16px; font-size:14px; font-weight:500; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .btn-delete { background:none; color:var(--red); border:1px solid var(--red); padding:12px 16px; font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; margin-left:auto; }
  .btn-delete:hover { background:var(--red-light); }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; text-align:center; color:var(--gray); }
  .empty-state .big-icon { font-size:56px; margin-bottom:14px; opacity:0.4; }
  .empty-state h3 { font-size:17px; font-weight:700; color:var(--text); margin-bottom:5px; }

  .preview-box { background:var(--off-white); border:1px solid var(--border); padding:14px; margin-top:14px; border-left:3px solid var(--gold); }
  .preview-box-title { font-size:10px; font-weight:700; color:var(--gold); letter-spacing:2px; margin-bottom:6px; font-family:'Barlow Condensed',sans-serif; }
  .preview-content { font-size:13px; color:var(--text); line-height:1.9; white-space:pre-wrap; }

  .toast { position:fixed; bottom:20px; right:16px; z-index:999; background:var(--green-deep); color:var(--white); padding:10px 16px; font-size:13px; font-weight:700; border-left:3px solid var(--gold); transform:translateY(80px); opacity:0; transition:all 0.3s ease; pointer-events:none; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { border-left-color:var(--red); }

  .loading-overlay { position:fixed; inset:0; background:rgba(7,26,15,0.7); display:none; align-items:center; justify-content:center; z-index:200; flex-direction:column; gap:12px; }
  .loading-overlay.show { display:flex; }
  .spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { color:var(--white); font-size:13px; }

  .pw-screen { position:fixed; inset:0; z-index:999; background:var(--green-deep); display:flex; align-items:center; justify-content:center; padding:24px; }
  .pw-card { background:rgba(255,255,255,0.04); border:1px solid rgba(212,168,32,0.2); width:100%; max-width:340px; padding:32px 24px; }
  .pw-icon { font-size:36px; text-align:center; margin-bottom:12px; }
  .pw-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; color:var(--white); text-align:center; margin-bottom:18px; }
  .pw-title span { color:var(--gold); }
  .pw-input { width:100%; padding:12px 13px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:var(--white); font-size:16px; font-family:'Noto Sans JP',sans-serif; outline:none; margin-bottom:10px; border-radius:0; }
  .pw-input:focus { border-color:var(--gold); }
  .pw-input.shake { animation:shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .pw-error { font-size:12px; color:#FF8A8A; min-height:16px; margin-bottom:12px; }
  .pw-btn { width:100%; padding:13px; background:var(--gold); color:var(--green-deep); border:none; font-size:14px; font-weight:900; font-family:'Noto Sans JP',sans-serif; cursor:pointer; }
  .pw-btn:hover { background:var(--gold-light); }

  .section-hint { font-size:11px; color:var(--gray); margin-bottom:8px; }
</style>
</head>
<body>

<div class="pw-screen" id="pwScreen">
  <div class="pw-card">
    <div class="pw-icon">📰</div>
    <div class="pw-title">ニュース管理 <span>GRANDE</span></div>
    <input class="pw-input" type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" onclick="checkPw()">ログイン →</button>
  </div>
</div>

<header>
  <div class="header-title">
    <div class="icon">📰</div>
    <h1>ニュース管理 <span>GRANDE FC</span></h1>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">接続中...</span>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>投稿一覧</h2>
      <button class="btn-add" onclick="newPost()">＋ 新規投稿</button>
    </div>
    <div class="post-list" id="postList"></div>
  </div>

  <div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">📝</div>
      <h3>投稿を選択または新規作成</h3>
      <p style="font-size:13px;">左のリストから投稿を選ぶか、<br>「＋ 新規投稿」ボタンで作成してください。</p>
    </div>

    <div class="form-panel" id="formPanel">
      <div class="form-panel-title" id="formTitle">新規投稿</div>
      <div class="form-panel-sub">投稿情報を入力してください</div>

      <!-- カテゴリー・日付 -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">カテゴリー <span class="req">必須</span></label>
          <select class="form-select" id="fCat" onchange="onCategoryChange()">
            <option value="">選択してください</option>
            <option value="ジュニアユース">ジュニアユース</option>
            <option value="ジュニア">ジュニア</option>
            <option value="スクール">スクール</option>
            <option value="グランデ食堂">グランデ食堂</option>
            <option value="巡回サッカー">巡回サッカー</option>
            <option value="イベント">イベント</option>
            <option value="お知らせ">お知らせ</option>
            <option value="選手募集">選手募集</option>
            <option value="クラブニュース">クラブニュース</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">日付 <span class="req">必須</span></label>
          <input class="form-input" type="date" id="fDate">
        </div>
      </div>

      <!-- テンプレートセクション -->
      <div class="tmpl-section" id="tmplSection" style="display:none;">
        <div class="tmpl-title" id="tmplTitle">📝 記事を自動生成</div>

        <!-- ジュニアユース・ジュニア（試合結果） -->
        <div class="tmpl-form" id="tmpl_match">
          <p class="section-hint">入力した情報だけで記事を生成します。空欄の項目は記事に含まれません。</p>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_tournament" placeholder="大会名（例：ツルカップ）">
            <input class="tmpl-input" type="text" id="t_opponent" placeholder="対戦相手（例：FC八ヶ岳）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_score" placeholder="スコア（例：3-1）">
            <input class="tmpl-input" type="text" id="t_scorer" placeholder="得点者（例：山田・鈴木）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_assist" placeholder="アシスト（例：佐藤・中村）">
          </div>
          <div class="form-label" style="margin-bottom:6px;">試合テーマ（複数選択可）</div>
          <div class="theme-checks">
            <input type="checkbox" class="theme-check" id="th1" value="前進"><label class="theme-label" for="th1">前進</label>
            <input type="checkbox" class="theme-check" id="th2" value="守備"><label class="theme-label" for="th2">守備</label>
            <input type="checkbox" class="theme-check" id="th3" value="攻撃"><label class="theme-label" for="th3">攻撃</label>
            <input type="checkbox" class="theme-check" id="th4" value="切り替え"><label class="theme-label" for="th4">切り替え</label>
            <input type="checkbox" class="theme-check" id="th5" value="ハードワーク"><label class="theme-label" for="th5">ハードワーク</label>
            <input type="checkbox" class="theme-check" id="th6" value="粘り強さ"><label class="theme-label" for="th6">粘り強さ</label>
            <input type="checkbox" class="theme-check" id="th7" value="チャレンジ"><label class="theme-label" for="th7">チャレンジ</label>
            <input type="checkbox" class="theme-check" id="th8" value="仲間を助ける"><label class="theme-label" for="th8">仲間を助ける</label>
          </div>
          <textarea class="tmpl-textarea" id="t_comment" placeholder="コーチコメント（例：最後まであきらめずに戦えた試合でした）"></textarea>
        </div>

        <!-- スクール -->
        <div class="tmpl-form" id="tmpl_school">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_s_date" placeholder="開催日（例：6月3日）">
            <input class="tmpl-input" type="text" id="t_s_theme" placeholder="テーマ（例：ドリブル）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_s_count" placeholder="参加人数（例：20名）">
          </div>
          <textarea class="tmpl-textarea" id="t_s_comment" placeholder="コメント（例：みんな元気よく楽しんでくれました）"></textarea>
        </div>

        <!-- グランデ食堂 -->
        <div class="tmpl-form" id="tmpl_shokudo">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_sh_date" placeholder="開催日（例：6月3日）">
            <input class="tmpl-input" type="text" id="t_sh_count" placeholder="参加人数（例：30名）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_sh_total" placeholder="総杯数（例：85杯）">
            <input class="tmpl-input" type="text" id="t_sh_avg" placeholder="平均杯数（例：2.8杯）">
          </div>
          <input class="tmpl-input" type="text" id="t_sh_menu" placeholder="メニュー（例：カレーライス・みそ汁）" style="margin-bottom:8px;">
          <textarea class="tmpl-textarea" id="t_sh_comment" placeholder="コメント（例：たくさん食べてくれました）"></textarea>
        </div>

        <!-- 巡回サッカー -->
        <div class="tmpl-form" id="tmpl_junkai">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_j_place" placeholder="訪問先（例：○○小学校）">
            <input class="tmpl-input" type="text" id="t_j_grade" placeholder="対象学年（例：3〜6年生）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_j_count" placeholder="参加人数（例：35名）">
          </div>
          <textarea class="tmpl-textarea" id="t_j_comment" placeholder="コメント（例：ボールを使った遊びを中心に楽しみました）"></textarea>
        </div>

        <!-- イベント -->
        <div class="tmpl-form" id="tmpl_event">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_ev_name" placeholder="イベント名（例：サマーキャンプ2026）">
            <input class="tmpl-input" type="text" id="t_ev_date" placeholder="開催日（例：8月10日〜11日）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_ev_venue" placeholder="会場（例：八ヶ岳グラウンド）">
            <input class="tmpl-input" type="text" id="t_ev_target" placeholder="対象（例：小学3〜6年生）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_ev_fee" placeholder="参加費（例：3,000円）">
            <input class="tmpl-input" type="text" id="t_ev_apply" placeholder="申込方法（例：LINEにて受付）">
          </div>
          <textarea class="tmpl-textarea" id="t_ev_content" placeholder="内容・アピールポイント（例：コーチと一緒に楽しく上達できます）"></textarea>
        </div>

        <!-- お知らせ -->
        <div class="tmpl-form" id="tmpl_info">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_in_title" placeholder="タイトル（例：練習日程変更のお知らせ）">
          </div>
          <textarea class="tmpl-textarea" id="t_in_content" placeholder="内容（例：6月10日の練習は会場の都合により中止となります）"></textarea>
        </div>

        <!-- 選手募集 -->
        <div class="tmpl-form" id="tmpl_recruit">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_r_cat" placeholder="募集カテゴリー（例：ジュニアユース）">
            <input class="tmpl-input" type="text" id="t_r_grade" placeholder="対象学年（例：中学1〜3年生）">
          </div>
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_r_day" placeholder="活動日（例：火・木・土）">
            <input class="tmpl-input" type="text" id="t_r_place" placeholder="活動場所（例：八ヶ岳グラウンド）">
          </div>
          <div class="tmpl-row">
            <select class="tmpl-select" id="t_r_trial">
              <option value="">体験練習</option>
              <option value="随時受付中">体験練習：随時受付中</option>
              <option value="受付なし">体験練習：受付なし</option>
            </select>
            <input class="tmpl-input" type="text" id="t_r_apply" placeholder="申込方法（例：LINEにてご連絡ください）">
          </div>
          <textarea class="tmpl-textarea" id="t_r_appeal" placeholder="アピールポイント（例：アットホームなチームで、初心者も大歓迎です）"></textarea>
        </div>

        <!-- クラブニュース汎用 -->
        <div class="tmpl-form" id="tmpl_general">
          <div class="tmpl-row">
            <input class="tmpl-input" type="text" id="t_g_title" placeholder="テーマ・タイトル">
          </div>
          <textarea class="tmpl-textarea" id="t_g_content" placeholder="内容を入力してください"></textarea>
        </div>

        <button class="btn-gen" onclick="generateTemplate()">📄 記事を生成する</button>
      </div>

      <!-- タイトル -->
      <div class="form-group">
        <label class="form-label">タイトル <span class="req">必須</span></label>
        <input class="form-input" type="text" id="fTitle" placeholder="例：ツルカップ 3-1勝利！">
      </div>

      <!-- 画像URL -->
      <div class="form-group">
        <label class="form-label">画像URL（Googleドライブのリンク）</label>
        <input class="form-input" type="text" id="fImage" placeholder="https://drive.google.com/file/d/..." oninput="onImageInput(this.value)">
        <div id="imagePreview" style="display:none; margin-top:8px;">
          <img id="imagePreviewImg" src="" alt="" style="max-width:100%; max-height:200px; object-fit:cover;">
        </div>
      </div>

      <!-- 本文 -->
      <div class="form-group">
        <label class="form-label">本文</label>
        <textarea class="form-textarea" id="fBody" placeholder="本文を入力、または上の「記事を生成する」で自動作成できます。"></textarea>
      </div>

      <div class="preview-box" id="previewBox" style="display:none;">
        <div class="preview-box-title">PREVIEW</div>
        <div class="preview-content" id="previewContent"></div>
      </div>

      <div class="form-actions">
        <button class="btn-save" onclick="savePost()">公開する</button>
        <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
        <button class="btn-delete" id="btnDelete" onclick="deletePost()" style="display:none;">削除</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">保存中...</div>
</div>

<script>
const API_KEY  = '$2a$10$fMVrBXjLBMllbrm18CDXy.ELqnMQmZbg65x13ZhaU55B/4Tuq4Ina';
const NEWS_BIN = '6a1ed74af5f4af5e29ad180b';

let posts = [];
let editingId = null;

// ===== ランダム選択ヘルパー =====
function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ===== パスワード =====
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === 'tatti109') {
    document.getElementById('pwScreen').style.display = 'none';
    sessionStorage.setItem('grande_news_auth', '1');
    initApp();
  } else {
    document.getElementById('pwError').textContent = 'パスワードが違います';
    const inp = document.getElementById('pwInput');
    inp.classList.add('shake'); inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}
if (sessionStorage.getItem('grande_news_auth') === '1') {
  document.getElementById('pwScreen').style.display = 'none';
  initApp();
}

// ===== 初期化 =====
async function initApp() {
  setSyncStatus('syncing', '接続中...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${NEWS_BIN}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await res.json();
    posts = json.record.posts || [];
    renderList();
    setSyncStatus('synced', '同期済み');
  } catch(e) {
    setSyncStatus('error', 'エラー');
    showToast('接続に失敗しました', true);
  }
}

async function savePosts() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${NEWS_BIN}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
    body: JSON.stringify({ posts })
  });
  if (!res.ok) throw new Error('Save failed');
}

function renderList() {
  const list = document.getElementById('postList');
  if (!posts.length) { list.innerHTML = '<div class="empty-list">投稿がありません</div>'; return; }
  const sorted = [...posts].sort((a,b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = sorted.map(p => `
    <div class="post-item ${editingId === p.id ? 'active' : ''}" onclick="editPost('${p.id}')">
      <div class="post-item-cat">${p.category || ''}</div>
      <div class="post-item-title">${p.title || '（タイトルなし）'}</div>
      <div class="post-item-date">${formatDate(p.date)}</div>
    </div>
  `).join('');
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ===== カテゴリー変更 =====
function onCategoryChange() {
  const cat = document.getElementById('fCat').value;
  const sec = document.getElementById('tmplSection');
  document.querySelectorAll('.tmpl-form').forEach(f => f.classList.remove('active'));

  if (!cat) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  const map = {
    'ジュニアユース': 'tmpl_match',
    'ジュニア': 'tmpl_match',
    'スクール': 'tmpl_school',
    'グランデ食堂': 'tmpl_shokudo',
    '巡回サッカー': 'tmpl_junkai',
    'イベント': 'tmpl_event',
    'お知らせ': 'tmpl_info',
    '選手募集': 'tmpl_recruit',
    'クラブニュース': 'tmpl_general',
  };
  const formId = map[cat] || 'tmpl_general';
  const el = document.getElementById(formId);
  if (el) el.classList.add('active');

  const titles = {
    'ジュニアユース': '⚽ 試合結果を入力',
    'ジュニア': '⚽ 試合結果を入力',
    'スクール': '🏫 スクール情報を入力',
    'グランデ食堂': '🍚 食堂情報を入力',
    '巡回サッカー': '🏃 巡回サッカー情報を入力',
    'イベント': '📅 イベント情報を入力',
    'お知らせ': '📢 お知らせ内容を入力',
    '選手募集': '🌟 募集情報を入力',
    'クラブニュース': '📝 内容を入力',
  };
  document.getElementById('tmplTitle').textContent = titles[cat] || '📝 記事を自動生成';
}

// ===== テンプレート生成 =====
function generateTemplate() {
  const cat = document.getElementById('fCat').value;
  let body = '';
  let title = '';

  if (cat === 'ジュニアユース' || cat === 'ジュニア') {
    const tournament = document.getElementById('t_tournament').value.trim();
    const opponent   = document.getElementById('t_opponent').value.trim();
    const score      = document.getElementById('t_score').value.trim();
    const scorer     = document.getElementById('t_scorer').value.trim();
    const assist     = document.getElementById('t_assist').value.trim();
    const comment    = document.getElementById('t_comment').value.trim();
    const themes     = [...document.querySelectorAll('.theme-check:checked')].map(c => c.value);

    if (!opponent && !score) { showToast('対戦相手またはスコアを入力してください', true); return; }

    // 勝敗判定
    let result = '';
    let resultLabel = '';
    if (score) {
      const parts = score.split('-');
      const a = parseInt(parts[0]), b = parseInt(parts[1]);
      if (!isNaN(a) && !isNaN(b)) {
        if (a > b) { result = 'win'; resultLabel = '勝利'; }
        else if (a === b) { result = 'draw'; resultLabel = '引き分け'; }
        else { result = 'lose'; resultLabel = '敗戦'; }
      }
    }

    // タイトル生成（複数パターン）
    const titlePatterns = {
      win: [
        `${tournament || '試合'} ${score}で${resultLabel}！`,
        `${opponent}戦 ${score} ${resultLabel}`,
        `【${resultLabel}】${tournament || '試合'} vs ${opponent} ${score}`,
      ],
      draw: [
        `${tournament || '試合'} ${score} ${resultLabel}`,
        `${opponent}戦 ${score}で${resultLabel}`,
        `【${resultLabel}】${tournament || '試合'} vs ${opponent}`,
      ],
      lose: [
        `${tournament || '試合'} ${score} ${resultLabel}`,
        `${opponent}戦 ${resultLabel}（${score}）`,
        `【${resultLabel}】${tournament || '試合'} vs ${opponent}`,
      ],
    };
    title = rnd(titlePatterns[result] || titlePatterns['draw'] || [`${tournament || '試合'} 試合結果`]);

    // 本文：第1段落（試合結果）複数パターン
    const p1_win = [
      `${tournament ? tournament + 'が行われました。' : '試合が行われました。'}${cat}は${opponent ? opponent + 'と対戦し、' : ''}${score ? score + 'で' : ''}${resultLabel}しました。`,
      `${tournament || '試合'}にて、${opponent ? opponent + 'との一戦' : '試合'}が行われました。結果は${score ? score + 'で' : ''}${resultLabel}でした。`,
      `${opponent ? opponent + '戦' : '試合'}（${tournament || ''}）の結果をお知らせします。スコアは${score || ''}、${resultLabel}でした。`,
    ];
    const p1_draw = [
      `${tournament ? tournament + 'が行われました。' : '試合が行われました。'}${opponent ? opponent + 'との試合は' : '今回の試合は'}${score ? score + 'で' : ''}${resultLabel}となりました。`,
      `${tournament || '試合'}にて、${opponent ? opponent + 'と対戦' : '試合'}しました。結果は${score ? score + 'で' : ''}${resultLabel}でした。`,
    ];
    const p1_lose = [
      `${tournament ? tournament + 'が行われました。' : '試合が行われました。'}${opponent ? opponent + 'との試合は' : '今回の試合は'}${score ? score + 'で' : ''}${resultLabel}となりました。`,
      `${tournament || '試合'}にて、${opponent ? opponent + 'と対戦' : '試合'}しました。スコアは${score || ''}、結果は${resultLabel}でした。`,
    ];

    let p1 = '';
    if (result === 'win') p1 = rnd(p1_win);
    else if (result === 'draw') p1 = rnd(p1_draw);
    else p1 = rnd(p1_lose);

    // 第2段落（得点・アシスト情報）
    let p2 = '';
    if (scorer || assist) {
      const scorerAssistPatterns = [];
      if (scorer && assist) {
        scorerAssistPatterns.push(`得点は${scorer}、アシストは${assist}でした。`);
        scorerAssistPatterns.push(`${scorer}が得点を挙げ、${assist}がアシストを記録しました。`);
        scorerAssistPatterns.push(`得点者は${scorer}、アシストは${assist}です。`);
      } else if (scorer) {
        scorerAssistPatterns.push(`得点は${scorer}でした。`);
        scorerAssistPatterns.push(`${scorer}が得点を挙げました。`);
      } else if (assist) {
        scorerAssistPatterns.push(`アシストは${assist}でした。`);
      }
      p2 = rnd(scorerAssistPatterns);
    }

    // 第3段落（テーマ）
    let p3 = '';
    if (themes.length > 0) {
      const themeStr = themes.join('・');
      const themePatterns = [
        `今日のテーマは「${themeStr}」でした。`,
        `今回の試合では「${themeStr}」を意識して臨みました。`,
        `試合を通じて「${themeStr}」に取り組みました。`,
      ];
      p3 = rnd(themePatterns);
    }

    // 第4段落（コーチコメント）
    let p4 = '';
    if (comment) {
      const commentPatterns = [
        comment,
        `コーチより：${comment}`,
      ];
      p4 = rnd(commentPatterns);
    }

    // 締め（複数パターン）
    const closing_win = [
      '引き続き応援をよろしくお願いします。',
      '次の試合もしっかり準備して臨みます。',
      '次戦もよろしくお願いします。',
    ];
    const closing_draw = [
      '次の試合に向けてしっかり準備していきます。',
      '引き続き応援をよろしくお願いします。',
    ];
    const closing_lose = [
      '次の試合に向けて準備していきます。引き続き応援をよろしくお願いします。',
      '次戦に向けてしっかり取り組んでいきます。',
    ];
    let closing = '';
    if (result === 'win') closing = rnd(closing_win);
    else if (result === 'draw') closing = rnd(closing_draw);
    else closing = rnd(closing_lose);

    body = [p1, p2, p3, p4, closing].filter(Boolean).join('\n\n');

  } else if (cat === 'スクール') {
    const date    = document.getElementById('t_s_date').value.trim();
    const theme   = document.getElementById('t_s_theme').value.trim();
    const count   = document.getElementById('t_s_count').value.trim();
    const comment = document.getElementById('t_s_comment').value.trim();

    title = `スクール活動レポート${date ? '（' + date + '）' : ''}`;

    const openings = [
      `${date ? date + 'に' : ''}スクールを開催しました。`,
      `${date ? date + 'の' : ''}スクール活動の報告です。`,
    ];
    let p1 = rnd(openings);
    if (count) p1 += `${count}が参加しました。`;
    const p2 = theme ? `今回のテーマは「${theme}」でした。` : '';
    const p3 = comment || '';
    body = [p1, p2, p3].filter(Boolean).join('\n\n');

  } else if (cat === 'グランデ食堂') {
    const date    = document.getElementById('t_sh_date').value.trim();
    const count   = document.getElementById('t_sh_count').value.trim();
    const total   = document.getElementById('t_sh_total').value.trim();
    const avg     = document.getElementById('t_sh_avg').value.trim();
    const menu    = document.getElementById('t_sh_menu').value.trim();
    const comment = document.getElementById('t_sh_comment').value.trim();

    title = `グランデ食堂${date ? '（' + date + '）' : ''}`;

    const openings = [
      `${date ? date + 'に' : ''}グランデ食堂を開催しました。`,
      `${date ? date + 'の' : ''}グランデ食堂の報告です。`,
    ];
    let p1 = rnd(openings);
    if (count) p1 += `${count}が参加しました。`;
    let p2 = '';
    if (menu) p2 += `メニューは${menu}でした。`;
    if (total) p2 += (p2 ? '　' : '') + `総杯数は${total}。`;
    if (avg) p2 += `1人あたりの平均は${avg}でした。`;
    const p3 = comment || '';
    body = [p1, p2, p3].filter(Boolean).join('\n\n');

  } else if (cat === '巡回サッカー') {
    const place   = document.getElementById('t_j_place').value.trim();
    const grade   = document.getElementById('t_j_grade').value.trim();
    const count   = document.getElementById('t_j_count').value.trim();
    const comment = document.getElementById('t_j_comment').value.trim();

    title = `巡回サッカー${place ? '（' + place + '）' : ''}`;

    const openings = [
      `${place ? place + 'に' : ''}巡回サッカーに行ってきました。`,
      `${place ? place + 'へ' : '巡回サッカーに'}お伺いしました。`,
    ];
    let p1 = rnd(openings);
    if (grade) p1 += `${grade}を対象に実施しました。`;
    if (count) p1 += `${count}が参加してくれました。`;
    const p2 = comment || '';
    body = [p1, p2].filter(Boolean).join('\n\n');

  } else if (cat === 'イベント') {
    const name    = document.getElementById('t_ev_name').value.trim();
    const date    = document.getElementById('t_ev_date').value.trim();
    const venue   = document.getElementById('t_ev_venue').value.trim();
    const target  = document.getElementById('t_ev_target').value.trim();
    const fee     = document.getElementById('t_ev_fee').value.trim();
    const apply   = document.getElementById('t_ev_apply').value.trim();
    const content = document.getElementById('t_ev_content').value.trim();

    if (!name) { showToast('イベント名を入力してください', true); return; }
    title = name;

    let p1 = `${name}を開催します。`;
    if (date) p1 += `開催日は${date}です。`;
    if (venue) p1 += `会場は${venue}です。`;

    let p2 = '';
    if (target) p2 += `対象：${target}　`;
    if (fee) p2 += `参加費：${fee}　`;
    if (apply) p2 += `申込方法：${apply}`;

    const p3 = content || '';
    body = [p1, p2, p3].filter(Boolean).join('\n\n');

  } else if (cat === 'お知らせ') {
    const inTitle  = document.getElementById('t_in_title').value.trim();
    const content  = document.getElementById('t_in_content').value.trim();

    if (!inTitle && !content) { showToast('内容を入力してください', true); return; }
    title = inTitle || 'お知らせ';

    const openings = [
      `${inTitle ? inTitle + 'についてお知らせします。' : 'お知らせです。'}`,
      `${inTitle || 'お知らせ'}のご案内です。`,
    ];
    const p1 = rnd(openings);
    body = [p1, content].filter(Boolean).join('\n\n');

  } else if (cat === '選手募集') {
    const recCat  = document.getElementById('t_r_cat').value.trim();
    const grade   = document.getElementById('t_r_grade').value.trim();
    const day     = document.getElementById('t_r_day').value.trim();
    const place   = document.getElementById('t_r_place').value.trim();
    const trial   = document.getElementById('t_r_trial').value;
    const apply   = document.getElementById('t_r_apply').value.trim();
    const appeal  = document.getElementById('t_r_appeal').value.trim();

    title = `${recCat || ''}選手募集`;

    const openings = [
      `GRANDE FC ${recCat || ''}では選手を募集しています。`,
      `${recCat || 'チーム'}の選手を募集中です。`,
    ];
    let p1 = rnd(openings);

    let p2 = '';
    if (grade) p2 += `対象：${grade}　`;
    if (day) p2 += `活動日：${day}　`;
    if (place) p2 += `活動場所：${place}`;

    let p3 = '';
    if (trial) p3 += `${trial}　`;
    if (apply) p3 += `お申し込み：${apply}`;

    const p4 = appeal || '';
    body = [p1, p2, p3, p4].filter(Boolean).join('\n\n');

  } else {
    // クラブニュース・汎用
    const gTitle   = document.getElementById('t_g_title').value.trim();
    const gContent = document.getElementById('t_g_content').value.trim();
    title = gTitle || '';
    body  = gContent || '';
  }

  if (!body) { showToast('内容を入力してください', true); return; }

  document.getElementById('fBody').value = body;
  document.getElementById('previewContent').textContent = body;
  document.getElementById('previewBox').style.display = 'block';
  if (!document.getElementById('fTitle').value && title) {
    document.getElementById('fTitle').value = title;
  }
  showToast('記事を生成しました！');
}

// ===== 新規 =====
function newPost() {
  editingId = null;
  document.getElementById('fCat').value = '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fTitle').value = '';
  document.getElementById('fBody').value = '';
  document.getElementById('fImage').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('previewBox').style.display = 'none';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('formTitle').textContent = '新規投稿';
  document.getElementById('tmplSection').style.display = 'none';
  document.querySelectorAll('.tmpl-form').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.theme-check').forEach(c => c.checked = false);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('formPanel').classList.add('show');
}

// ===== 編集 =====
function editPost(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('fCat').value   = p.category || '';
  document.getElementById('fDate').value  = p.date || '';
  document.getElementById('fTitle').value = p.title || '';
  document.getElementById('fBody').value  = p.body || '';
  document.getElementById('fImage').value = p.image || '';
  if (p.image) {
    document.getElementById('imagePreviewImg').src = p.image;
    document.getElementById('imagePreview').style.display = 'block';
  } else {
    document.getElementById('imagePreview').style.display = 'none';
  }
  document.getElementById('formTitle').textContent = p.title || '編集';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('previewBox').style.display = p.body ? 'block' : 'none';
  document.getElementById('previewContent').textContent = p.body || '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('formPanel').classList.add('show');
  onCategoryChange();
  renderList();
}

// ===== 保存 =====
async function savePost() {
  const title = document.getElementById('fTitle').value.trim();
  const cat   = document.getElementById('fCat').value;
  const date  = document.getElementById('fDate').value;
  if (!title) { showToast('タイトルを入力してください', true); return; }
  if (!cat)   { showToast('カテゴリーを選択してください', true); return; }
  if (!date)  { showToast('日付を入力してください', true); return; }

  const rawImageUrl = document.getElementById('fImage').value.trim();
  const convertedImage = rawImageUrl ? convertDriveUrl(rawImageUrl) : null;

  const postData = {
    id: editingId || 'post_' + Date.now(),
    title, category: cat, date,
    body: document.getElementById('fBody').value.trim(),
    image: convertedImage,
    updatedAt: new Date().toISOString()
  };

  showLoading('保存中...');
  setSyncStatus('syncing', '保存中...');
  try {
    if (editingId) {
      const idx = posts.findIndex(p => p.id === editingId);
      if (idx !== -1) posts[idx] = postData;
    } else {
      posts.unshift(postData);
    }
    await savePosts();
    editingId = postData.id;
    renderList();
    setSyncStatus('synced', '同期済み');
    showToast('公開しました！');
    document.getElementById('formTitle').textContent = postData.title;
    document.getElementById('btnDelete').style.display = 'block';
  } catch(e) {
    showToast('保存に失敗しました', true);
    setSyncStatus('error', 'エラー');
  } finally {
    hideLoading();
  }
}

// ===== 削除 =====
async function deletePost() {
  if (!editingId) return;
  const p = posts.find(x => x.id === editingId);
  if (!confirm(`「${p?.title || '投稿'}」を削除しますか？`)) return;
  showLoading('削除中...');
  try {
    posts = posts.filter(x => x.id !== editingId);
    await savePosts();
    showToast('削除しました');
    closeForm();
    renderList();
  } catch(e) {
    showToast('削除に失敗しました', true);
  } finally {
    hideLoading();
  }
}

function closeForm() {
  editingId = null;
  document.getElementById('formPanel').classList.remove('show');
  document.getElementById('emptyState').style.display = 'flex';
  renderList();
}

function convertDriveUrl(url) {
  if (!url) return null;
  const m1 = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m1) return 'https://lh3.googleusercontent.com/d/' + m1[1];
  const m2 = url.match(/[?&]id=([^&]+)/);
  if (m2) return 'https://lh3.googleusercontent.com/d/' + m2[1];
  if (url.startsWith('http')) return url;
  return null;
}

function onImageInput(val) {
  const converted = convertDriveUrl(val.trim());
  if (converted) {
    document.getElementById('imagePreviewImg').src = converted;
    document.getElementById('imagePreview').style.display = 'block';
  } else {
    document.getElementById('imagePreview').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const bodyInput = document.getElementById('fBody');
  if (bodyInput) {
    bodyInput.addEventListener('input', () => {
      const val = bodyInput.value;
      if (val) {
        document.getElementById('previewContent').textContent = val;
        document.getElementById('previewBox').style.display = 'block';
      } else {
        document.getElementById('previewBox').style.display = 'none';
      }
    });
  }
});

function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot ' + (state === 'synced' ? 'synced' : state === 'syncing' ? 'syncing' : '');
  document.getElementById('syncText').textContent = text;
}
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoading(msg='処理中...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}
</script>
</body>
</html>
