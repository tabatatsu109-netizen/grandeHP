<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グランデ 管理ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1A6B3C; --green-dark:#0f4526; --green-light:#2a8a52; --green-pale:#e8f5ee;
    --gold:#D4A820; --gold-light:#f0c840; --gold-pale:#fdf6e0;
    --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-400:#9ca3af; --gray-600:#4b5563; --gray-800:#1f2937;
    --red:#dc2626;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans JP',sans-serif;
    background: linear-gradient(160deg, var(--green-dark) 0%, #1a4a2e 40%, #0d3520 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 24px 24px 0;
    text-align: center;
  }
  .header-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--green-dark);
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 3px;
    margin-bottom: 14px;
  }
  .header-title {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: white;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .header-title span { color: var(--gold); }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  /* ===== CARDS ===== */
  .cards {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 0 24px 60px;
    flex-wrap: wrap;
    flex: 1;
    align-items: center;
  }
  .app-card {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 36px 28px 32px;
    width: 260px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }
  .app-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,168,32,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .app-card:hover {
    background: rgba(255,255,255,0.12);
    border-color: var(--gold);
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(212,168,32,0.15);
  }
  .app-card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 52px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .card-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .card-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-dark);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(212,168,32,0.3);
  }
  .card-btn:hover { transform: scale(1.05); }

  /* ===== MODAL ===== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: popIn 0.25s ease;
  }
  @keyframes popIn { from{transform:scale(0.9);opacity:0;} to{transform:scale(1);opacity:1;} }
  .modal-icon { font-size: 44px; margin-bottom: 10px; display: block; }
  .modal-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .modal-sub { font-size: 12px; color: var(--gray-400); margin-bottom: 22px; }
  .modal-input {
    width: 100%;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .modal-input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,107,60,0.1); }
  .modal-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--green-light));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(26,107,60,0.3);
    margin-bottom: 10px;
  }
  .modal-btn:hover { transform: translateY(-1px); }
  .modal-cancel {
    background: none;
    border: none;
    color: var(--gray-400);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 6px;
  }
  .modal-cancel:hover { color: var(--gray-600); }
  .modal-err { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  /* ===== LOADING ===== */
  .going {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    z-index: 2000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .going.open { display: flex; }
  .going-text {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: white;
    letter-spacing: 2px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .going-icon { font-size: 48px; }

  @media(max-width:640px) {
    .header-title { font-size: 26px; }
    .app-card { width: 100%; max-width: 320px; }
    .cards { gap: 16px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="going" id="going">
  <div class="going-icon">⚽</div>
  <div class="going-text">移動中...</div>
</div>

<!-- PASSWORD MODAL -->
<div class="overlay" id="pwOverlay">
  <div class="modal">
    <span class="modal-icon" id="modalIcon"></span>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub">パスワードを入力してください</div>
    <input type="password" class="modal-input" id="pwInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPw()">
    <div class="modal-err" id="pwErr"></div>
    <button class="modal-btn" onclick="checkPw()">開く →</button>
    <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-badge">GRANDE FC</div>
  <div class="header-title">⚽ <span>GRANDE</span> PORTAL</div>
  <div class="header-sub">MANAGEMENT SYSTEM</div>
</div>

<!-- CARDS -->
<div class="cards">

  <div class="app-card" onclick="openApp('player')">
    <span class="card-icon">👥</span>
    <div class="card-title">選手管理</div>
    <div class="card-desc">
      選手プロフィール・登録情報<br>
      カテゴリ・ポジション管理<br>
      選手データの編集・追加
    </div>
    <button class="card-btn">開く →</button>
  </div>

  <div class="app-card" onclick="openApp('news')">
    <span class="card-icon">📰</span>
    <div class="card-title">ニュース管理</div>
    <div class="card-desc">
      お知らせ・ニュースの投稿<br>
      記事の編集・削除<br>
      公開設定の管理
    </div>
    <button class="card-btn">開く →</button>
  </div>

  <div class="app-card" onclick="openApp('shokudo')">
    <span class="card-icon">🍜</span>
    <div class="card-title">食堂管理</div>
    <div class="card-desc">
      杯数記録・出席管理<br>
      月別請求・ランキング<br>
      BMI記録・管理
    </div>
    <button class="card-btn">開く →</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">© GRANDE FC · MANAGEMENT PORTAL</div>

<script>
const APPS = {
  player:  { icon:'👥', title:'選手管理',   pw:'tatti109', url:'grande_player_manager.html' },
  news:    { icon:'📰', title:'ニュース管理', pw:'2001',     url:'grande_news_manager.html' },
  shokudo: { icon:'🍜', title:'食堂管理',   pw:'tatti109', url:'grande_shokudo_manager.html' },
};

let currentApp = null;

function openApp(key) {
  currentApp = key;
  const app = APPS[key];
  document.getElementById('modalIcon').textContent  = app.icon;
  document.getElementById('modalTitle').textContent = app.title;
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
  document.getElementById('pwOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pwInput').focus(), 100);
}

function checkPw() {
  const app = APPS[currentApp];
  const val = document.getElementById('pwInput').value;
  if (val === app.pw) {
    document.getElementById('pwOverlay').classList.remove('open');
    document.getElementById('going').classList.add('open');
    setTimeout(() => { window.location.href = app.url; }, 600);
  } else {
    document.getElementById('pwErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function closeModal() {
  document.getElementById('pwOverlay').classList.remove('open');
  currentApp = null;
}

document.getElementById('pwOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('pwOverlay')) closeModal();
});
</script>
</body>
</html>
