<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB SHOP | サッカークラブ公式アイテム</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--red:#E8001D;--dark:#0D0D0D;--mid:#1A1A1A;--light:#F5F5F5;--white:#fff;--accent:#FFD600;--muted:#888;--radius:12px;--fd:'Barlow Condensed',sans-serif;--fb:'Noto Sans JP',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--light);font-family:var(--fb);color:var(--dark);overflow-x:hidden}
button,input,select,textarea{font-family:var(--fb)}img{display:block}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--red);border-radius:99px}
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--dark);border-bottom:3px solid var(--red)}
.hdr-in{max-width:1200px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;background:none;border:none}
.logo-ic{width:38px;height:38px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-tx{font-family:var(--fd);font-size:22px;color:#fff;letter-spacing:3px}
.btn-cart{position:relative;background:none;border:none;padding:8px;color:#fff;font-size:24px;line-height:1;cursor:pointer}
.cart-bdg{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center}
#hero{margin-top:60px;background:var(--dark);position:relative;overflow:hidden;padding:64px 16px 52px}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0D0D0D,#1a0005 50%,#0D0D0D)}
.hero-sk{position:absolute;top:-20%;right:-10%;width:55%;height:140%;background:var(--red);opacity:.06;transform:skewX(-15deg)}
.hero-sk2{position:absolute;top:-20%;right:5%;width:15%;height:140%;background:var(--accent);opacity:.04;transform:skewX(-15deg)}
.hero-ct{position:relative;max-width:560px;margin:0 auto;text-align:center}
.hero-tag{display:inline-block;background:var(--red);color:#fff;font-family:var(--fd);font-size:12px;letter-spacing:4px;padding:4px 14px;margin-bottom:14px}
.hero-h1{font-family:var(--fd);font-size:clamp(40px,10vw,76px);color:#fff;letter-spacing:4px;line-height:.95;margin-bottom:16px}
.hero-h1 span{color:var(--red)}.hero-sub{color:#aaa;font-size:14px;line-height:1.8;margin-bottom:24px}
.btn-hero{background:var(--red);color:#fff;border:none;padding:14px 28px;font-family:var(--fd);font-size:18px;letter-spacing:2px;border-radius:4px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,0,29,.4)}
.sec{max-width:1200px;margin:0 auto;padding:44px 16px}
.sec-lbl{font-family:var(--fd);font-size:13px;letter-spacing:5px;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.sec-ttl{font-family:var(--fd);font-size:clamp(26px,5vw,40px);color:var(--dark);letter-spacing:2px;margin-bottom:28px}
.flt-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;scrollbar-width:none}
.flt-wrap::-webkit-scrollbar{display:none}
.flt-btn{white-space:nowrap;padding:8px 18px;border-radius:99px;border:2px solid #ddd;background:#fff;color:#555;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;flex-shrink:0}
.flt-btn.on{background:var(--dark);border-color:var(--dark);color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:18px}
.pcard{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s}
.pcard:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.12)}
.pimg{position:relative;padding-bottom:65%;overflow:hidden}
.pimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.pcard:hover .pimg img{transform:scale(1.06)}
.pcat{position:absolute;top:10px;left:10px;background:var(--dark);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:2px}
.pbody{padding:15px}
.pname{font-weight:900;font-size:16px;margin-bottom:4px}.pdesc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.pprice{font-family:var(--fd);font-size:26px;margin-bottom:12px;letter-spacing:1px}
.pprice small{font-size:13px;color:#bbb;font-family:var(--fb);font-weight:400}
.slbl{font-size:11px;font-weight:700;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.swrap{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sbtn{padding:5px 9px;border-radius:6px;border:1.5px solid #e0e0e0;background:#fff;font-size:12px;font-weight:700;color:#444;cursor:pointer;transition:all .15s}
.sbtn.on{background:var(--dark);border-color:var(--dark);color:#fff}
.stk{font-size:11px;font-weight:700;min-height:16px;margin-bottom:8px}
.stk-ok{color:#10B981}.stk-ng{color:var(--red)}
.qa-row{display:flex;gap:8px;align-items:center}
.qctrl{display:flex;align-items:center;border:1.5px solid #e0e0e0;border-radius:8px;overflow:hidden}
.qbtn{width:34px;height:38px;background:#f7f7f7;border:none;font-size:17px;color:#333;cursor:pointer}
.qval{width:34px;text-align:center;font-weight:700;font-size:15px}
.btn-add{flex:1;height:38px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:background .2s}
.btn-add:hover{background:var(--red)}.btn-add:disabled{background:#ccc;cursor:not-allowed}
#co{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;backdrop-filter:blur(2px)}
#co.open{display:block}
#cd{position:fixed;top:0;right:-100%;width:min(420px,100%);height:100%;background:#fff;z-index:1101;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.2)}
#cd.open{right:0}
.cd-hd{background:var(--dark);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:3px solid var(--red)}
.cd-ttl{font-family:var(--fd);color:#fff;font-size:22px;letter-spacing:3px}
.cd-body{flex:1;overflow-y:auto;padding:16px}
.cart-empty{text-align:center;padding:60px 0;color:#aaa}
.ci{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.ci-info{flex:1}.ci-name{font-weight:700;font-size:14px;margin-bottom:3px}
.ci-meta{font-size:12px;color:#888;margin-bottom:5px}.ci-price{font-weight:700;font-size:15px}
.btn-rm{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:2px;transition:color .15s}
.btn-rm:hover{color:var(--red)}
.cd-ft{padding:16px 20px;border-top:2px solid #f0f0f0;flex-shrink:0}
.ct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct-lbl{font-weight:700;color:#555}.ct-val{font-family:var(--fd);font-size:28px;letter-spacing:1px}
.btn-co{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:var(--fd);font-size:20px;letter-spacing:2px;cursor:pointer;transition:background .2s}
.btn-co:hover{background:#c0001a}
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1200;backdrop-filter:blur(3px);overflow-y:auto;padding:20px 16px}
#mo.open{display:flex;align-items:flex-start;justify-content:center}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:520px;overflow:hidden;animation:su .3s ease}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.mhd{background:var(--dark);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--red)}
.mhd-ttl{font-family:var(--fd);color:#fff;font-size:22px;letter-spacing:3px}
.btn-cm{background:none;border:none;color:#fff;font-size:24px;line-height:1;cursor:pointer}
.mbody{padding:22px}
.fg{margin-bottom:14px}.fl{display:block;font-size:12px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.fc{width:100%;padding:11px 13px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;color:var(--dark);outline:none;transition:border-color .2s;background:#fafafa}
.fc:focus{border-color:var(--dark);background:#fff}textarea.fc{height:72px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-f{width:100%;padding:13px;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#c0001a}
.btn-gray{background:#f0f0f0;color:#555}.btn-gray:hover{background:#e0e0e0}
.btn-green{background:#10B981;color:#fff}.btn-green:hover{background:#059669}
.sbox{background:#f8f8f8;border-radius:10px;padding:15px;margin-bottom:14px}
.srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:14px}
.srow:last-child{border:none}.srow.tot{font-weight:900;font-size:17px;padding-top:10px}
.s-tot-price{color:var(--red);font-family:var(--fd);font-size:22px}
.irow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #eee}
.irow:last-child{border:none}.ik{color:#888}.iv{font-weight:700}
.cpl-ic{width:70px;height:70px;background:linear-gradient(135deg,#10B981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
.cpl-ttl{font-family:var(--fd);font-size:26px;letter-spacing:2px;text-align:center;margin-bottom:6px}
.cpl-sub{text-align:center;color:#888;font-size:14px;margin-bottom:18px}
.oid-box{background:#FFF1F2;border:1px solid #FECDD3;border-radius:8px;padding:12px 16px;text-align:center;margin-bottom:14px;font-size:13px;color:#555}
.oid-val{font-family:var(--fd);font-size:22px;color:var(--red);letter-spacing:2px;display:block;margin-top:4px}
.note-box{background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px 13px;font-size:12px;color:#92400E;margin-bottom:12px;line-height:1.6}
#invoice-area{display:none}
@media print{
  body>*{display:none!important}
  #invoice-area{display:block!important;padding:32px;font-family:'Noto Sans JP',sans-serif}
  .inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;border-bottom:3px solid #E8001D;padding-bottom:16px}
  .inv-club{font-size:22px;font-weight:900;color:#E8001D;letter-spacing:2px}
  .inv-title{font-size:32px;font-weight:900;letter-spacing:4px}
  .inv-meta{margin-bottom:24px}
  .inv-meta table{width:100%;border-collapse:collapse}
  .inv-meta td{padding:5px 8px;font-size:13px;border:1px solid #e0e0e0}
  .inv-meta td:first-child{background:#f5f5f5;font-weight:700;width:120px}
  .inv-items table{width:100%;border-collapse:collapse;margin-bottom:16px}
  .inv-items th{background:#0D0D0D;color:#fff;padding:8px 10px;font-size:13px;text-align:left}
  .inv-items td{padding:8px 10px;font-size:13px;border-bottom:1px solid #eee}
  .inv-items tr:nth-child(even) td{background:#f9f9f9}
  .inv-total{text-align:right;font-size:18px;font-weight:900;margin-top:8px}
  .inv-total span{color:#E8001D;font-size:24px}
  .inv-footer{margin-top:24px;padding:12px;background:#f5f5f5;font-size:12px;border-radius:6px;color:#555}
}
#adm-sec{display:none;background:var(--dark);min-height:100vh;padding:60px 16px}
.alog-box{max-width:380px;margin:0 auto;background:#1A1A1A;border-radius:16px;padding:34px;border:1px solid #333}
.alog-ttl{font-family:var(--fd);color:#fff;font-size:28px;letter-spacing:3px;text-align:center;margin-bottom:6px}
.alog-sub{text-align:center;color:#666;font-size:12px;margin-bottom:4px}
.alog-hint{text-align:center;color:var(--red);font-size:11px;margin-bottom:18px}
.alog-err{color:var(--red);font-size:13px;text-align:center;margin-top:6px;min-height:18px}
#adm-panel{display:none;background:var(--light);min-height:100vh}
.ahd{background:var(--dark);padding:0 16px;border-bottom:3px solid var(--red)}
.ahd-in{max-width:1200px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between}
.ahd-logo{font-family:var(--fd);color:#fff;font-size:20px;letter-spacing:3px}
.ahd-logo span{color:var(--red)}
.atabs{background:#1A1A1A;border-bottom:1px solid #333}
.atabs-in{max-width:1200px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}
.atab{padding:15px 18px;background:none;border:none;color:#666;font-weight:700;font-size:13px;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s}
.atab.on{color:var(--red);border-bottom-color:var(--red)}
.acnt{max-width:1200px;margin:0 auto;padding:24px 16px}
.dc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:28px}
.dc{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.dc.r::before{background:var(--red)}.dc.b::before{background:#3B82F6}.dc.y::before{background:var(--accent)}.dc.g::before{background:#10B981}.dc.gr::before{background:#9CA3AF}
.dc-ic{font-size:20px;margin-bottom:6px}.dc-v{font-family:var(--fd);font-size:22px;color:var(--dark);margin-bottom:3px;letter-spacing:1px}.dc-l{font-size:11px;color:#888}
.sf-wrap{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.sf-btn{padding:6px 12px;border-radius:99px;border:none;font-weight:700;font-size:12px;white-space:nowrap;cursor:pointer;background:#fff;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sf-btn.on{background:var(--dark);color:#fff}
.olist{display:flex;flex-direction:column;gap:8px}
.ocard{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.ocard.sel{border-color:var(--red)}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.oc-name{font-weight:700;font-size:15px}.oc-meta{font-size:12px;color:#aaa;margin-top:2px}
.oc-items{font-size:13px;color:#555;margin-bottom:7px;line-height:1.6}
.oc-bot{display:flex;justify-content:space-between;align-items:center}
.oc-pay{font-size:12px;color:#888}.oc-tot{font-family:var(--fd);font-size:20px}
.odetail{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:none}
.odetail.open{display:block}
.sc-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.sc-btn{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:700;cursor:pointer;background:#f0f0f0;color:#555;transition:all .15s}
.sc-btn.cur{color:#fff}
.btn-inv{margin-top:10px;padding:9px 16px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-inv:hover{background:var(--red)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.bdg-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b0{background:#FEF3C7;color:#92400E}.b0 .bdg-dot{background:#F59E0B}
.b1{background:#DBEAFE;color:#1E40AF}.b1 .bdg-dot{background:#3B82F6}
.b2{background:#EDE9FE;color:#5B21B6}.b2 .bdg-dot{background:#8B5CF6}
.b3{background:#D1FAE5;color:#065F46}.b3 .bdg-dot{background:#10B981}
.b4{background:#F3F4F6;color:#374151}.b4 .bdg-dot{background:#9CA3AF}
.stcard{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:12px}
.stcard-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sthumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0}
.stname{font-weight:700;font-size:15px}.sttot{font-size:12px;color:#888;margin-top:2px}
.stsizes{display:flex;gap:6px;flex-wrap:wrap}
.stsz{background:#f8f8f8;border-radius:8px;padding:9px 12px;text-align:center;min-width:56px}
.stsz-l{font-size:10px;color:#888;margin-bottom:3px}.stsz-v{font-family:var(--fd);font-size:20px}.stsz-u{font-size:10px;color:#bbb}.stsz-stk{font-size:10px;color:#10B981;font-weight:700;margin-top:2px}
.stk-tog{display:flex;align-items:center;gap:5px;font-size:12px;color:#888;cursor:pointer;margin-left:auto}
.stk-tog input{cursor:pointer;accent-color:var(--red)}
.ejbox{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;border:1px solid #e0e0e0}
.ej-ttl{font-weight:700;font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ej-saved{font-size:11px;color:#10B981;font-weight:600;margin-left:auto;display:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:99px;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{background:#10B981}#toast.err{background:var(--red)}
footer{background:var(--dark);padding:28px 16px;text-align:center;color:#555;font-size:12px}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:14px;left:60%;width:80%;height:2px;background:#e0e0e0}
.step.done:not(:last-child)::after{background:var(--red)}
.step-num{width:28px;height:28px;border-radius:50%;background:#e0e0e0;color:#999;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.step.done .step-num{background:var(--red);color:#fff}.step.cur .step-num{background:var(--dark);color:#fff}
.step-lbl{font-size:10px;color:#aaa;white-space:nowrap}
.step.done .step-lbl,.step.cur .step-lbl{color:var(--dark);font-weight:700}
@media(max-width:600px){.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
<header id="hdr">
  <div class="hdr-in">
    <button class="logo" onclick="showShop()">
      <div class="logo-ic">⚽</div><span class="logo-tx">CLUB SHOP</span>
    </button>
    <button class="btn-cart" onclick="openCart()">🛒<span class="cart-bdg" id="cbdg">0</span></button>
  </div>
</header>

<div id="shop-page">
  <section id="hero">
    <div class="hero-bg"></div><div class="hero-sk"></div><div class="hero-sk2"></div>
    <div class="hero-ct">
      <div class="hero-tag">OFFICIAL CLUB ITEM</div>
      <h1 class="hero-h1">CLUB<br><span>SHOP</span></h1>
      <p class="hero-sub">公式クラブウェア・グッズの注文はこちらから<br>ご注文後、担当者よりご連絡いたします</p>
      <button class="btn-hero" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">商品を見る →</button>
    </div>
  </section>
  <section id="products">
    <div class="sec">
      <div class="sec-lbl">ITEMS</div>
      <h2 class="sec-ttl">商品一覧</h2>
      <div class="flt-wrap" id="flt"></div>
      <div class="pgrid" id="pgrid"></div>
    </div>
  </section>
  <footer>
    <p style="margin-bottom:8px">© 2024 Soccer Club Official Shop</p>
    <button style="background:transparent;border:1px solid #444;color:#888;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer" onclick="showAdminSec()">管理者ページ</button>
  </footer>
</div>

<div id="co" onclick="closeCart()"></div>
<div id="cd">
  <div class="cd-hd"><div class="cd-ttl">CART 🛒</div><button style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer" onclick="closeCart()">✕</button></div>
  <div class="cd-body" id="cd-body"></div>
  <div class="cd-ft">
    <div class="ct-row"><span class="ct-lbl">合計金額</span><span class="ct-val" id="ct-val">¥0</span></div>
    <button class="btn-co" onclick="openCheckout()">注文へ進む →</button>
  </div>
</div>

<div id="mo"><div class="mbox"><div class="mhd"><div class="mhd-ttl" id="m-ttl"></div><button class="btn-cm" onclick="closeModal()">✕</button></div><div class="mbody" id="m-body"></div></div></div>

<div id="adm-sec">
  <div class="alog-box">
    <div style="text-align:center;font-size:38px;margin-bottom:14px">🔐</div>
    <h2 class="alog-ttl">ADMIN</h2>
    <p class="alog-sub">管理者用パスワードを入力</p>
    <p class="alog-hint">デモ用: soccer2024</p>
    <input type="password" class="fc" id="apw" placeholder="パスワード" style="background:#0D0D0D;border-color:#333;color:#fff;margin-bottom:6px" onkeydown="if(event.key==='Enter')aLogin()">
    <div class="alog-err" id="aerr"></div>
    <button class="btn-f btn-red" onclick="aLogin()" style="margin-top:10px">ログイン</button>
    <button class="btn-f" onclick="showShop()" style="background:#222;color:#888;border:1px solid #333">← ショップに戻る</button>
  </div>
</div>

<div id="adm-panel">
  <div class="ahd"><div class="ahd-in">
    <div class="ahd-logo">ADMIN <span>PANEL</span></div>
    <div style="display:flex;gap:8px">
      <button style="background:transparent;border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer" onclick="showShop()">← ショップ</button>
      <button style="background:transparent;border:1px solid #444;color:#888;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer" onclick="aLogout()">ログアウト</button>
    </div>
  </div></div>
  <div class="atabs"><div class="atabs-in">
    <button class="atab on" onclick="aTab('dash',this)">📊 ダッシュボード</button>
    <button class="atab" onclick="aTab('orders',this)">📋 注文一覧</button>
    <button class="atab" onclick="aTab('stats',this)">📈 商品別集計</button>
    <button class="atab" onclick="aTab('cfg',this)">⚙️ EmailJS設定</button>
  </div></div>
  <div class="acnt">
    <div id="tab-dash"></div>
    <div id="tab-orders" style="display:none"></div>
    <div id="tab-stats" style="display:none"></div>
    <div id="tab-cfg" style="display:none"></div>
  </div>
</div>

<div id="invoice-area"></div>
<div id="toast"></div>

<script>
const PRODS=[
  {id:1,name:'プラクティスシャツ',desc:'吸湿速乾素材・クラブエンブレム刺繍入り',price:3500,cat:'トップス',img:'https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=600&q=80',sizes:['SS','S','M','L','XL','XXL'],stock:{SS:5,S:10,M:15,L:12,XL:8,XXL:3},showStock:true},
  {id:2,name:'ゲームパンツ',desc:'ストレッチ素材・ポケット付き',price:2800,cat:'ボトムス',img:'https://images.unsplash.com/photo-1556306535-38febf6782e7?w=600&q=80',sizes:['SS','S','M','L','XL','XXL'],stock:{SS:3,S:8,M:12,L:10,XL:6,XXL:2},showStock:false},
  {id:3,name:'ソックス',desc:'クッション性に優れたロングソックス',price:1200,cat:'アクセサリー',img:'https://images.unsplash.com/photo-1586350977771-b3b0abd50c82?w=600&q=80',sizes:['19-21','22-24','25-27','28-30'],stock:{'19-21':20,'22-24':25,'25-27':30,'28-30':15},showStock:true},
  {id:4,name:'トレーニングジャケット',desc:'防風・撥水加工・フルジップ仕様',price:6500,cat:'ジャケット',img:'https://images.unsplash.com/photo-1544441893-675973e31985?w=600&q=80',sizes:['SS','S','M','L','XL','XXL'],stock:{SS:2,S:5,M:8,L:7,XL:4,XXL:1},showStock:true},
  {id:5,name:'ウォームアップパンツ',desc:'裏起毛素材・サイドポケット付き',price:3200,cat:'ボトムス',img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80',sizes:['SS','S','M','L','XL','XXL'],stock:{SS:4,S:6,M:10,L:8,XL:5,XXL:2},showStock:false},
  {id:6,name:'クラブバッグ',desc:'大容量・シューズ収納ポケット付き',price:5800,cat:'バッグ',img:'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=600&q=80',sizes:['FREE'],stock:{FREE:12},showStock:true},
];
const CATS=['U12','U13','U14','U15','U16','U18'];
const PAYS=['現金払い','銀行振込','PayPay'];
const STS=['未確認','確認済み','発注済み','入荷済み','受け渡し完了'];
const ST_CLS=['b0','b1','b2','b3','b4'];
const ST_COL=['#F59E0B','#3B82F6','#8B5CF6','#10B981','#9CA3AF'];
const ADM_PW='soccer2024';
let cart=[],orders=[
  {id:'ORD-DEMO001',date:new Date(Date.now()-86400000*3).toISOString(),pName:'田中 花子',sName:'田中 翔',cat:'U13',email:'tanaka@example.com',items:[{pid:1,pname:'プラクティスシャツ',size:'M',qty:2,price:3500},{pid:3,pname:'ソックス',size:'25-27',qty:1,price:1200}],total:8200,pay:'現金払い',status:'確認済み',note:''},
  {id:'ORD-DEMO002',date:new Date(Date.now()-86400000).toISOString(),pName:'鈴木 美咲',sName:'鈴木 健',cat:'U15',email:'suzuki@example.com',items:[{pid:4,pname:'トレーニングジャケット',size:'L',qty:1,price:6500},{pid:2,pname:'ゲームパンツ',size:'L',qty:1,price:2800}],total:9300,pay:'銀行振込',status:'未確認',note:'名前刺繍希望'},
  {id:'ORD-DEMO003',date:new Date(Date.now()-86400000*7).toISOString(),pName:'佐藤 幸子',sName:'佐藤 大輝',cat:'U12',email:'sato@example.com',items:[{pid:1,pname:'プラクティスシャツ',size:'S',qty:1,price:3500},{pid:3,pname:'ソックス',size:'22-24',qty:2,price:1200}],total:5900,pay:'PayPay',status:'受け渡し完了',note:''},
];
let selOid=null,sfStatus='すべて',stockMap={};
let ejsCfg=JSON.parse(localStorage.getItem('ejsCfg')||'{}');
let curFilter='すべて';
let oForm={pName:'',sName:'',cat:'U13',email:'',pay:'現金払い',note:''};

const fmt=n=>'¥'+n.toLocaleString();
const fmtD=d=>new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});
const genId=()=>'ORD-'+Date.now().toString(36).toUpperCase();
function toast(msg,t='ok'){const el=document.getElementById('toast');el.textContent=(t==='ok'?'✓ ':'✕ ')+msg;el.className='show '+t;setTimeout(()=>el.className='',3000)}
function bdg(si){return`<span class="bdg ${ST_CLS[si]||'b0'}"><span class="bdg-dot"></span>${STS[si]}</span>`}
function sti(s){return STS.indexOf(s)}

function renderProds(){
  const cats=['すべて',...new Set(PRODS.map(p=>p.cat))];
  document.getElementById('flt').innerHTML=cats.map(c=>`<button class="flt-btn${c===curFilter?' on':''}" onclick="setFlt('${c}')">${c}</button>`).join('');
  const list=curFilter==='すべて'?PRODS:PRODS.filter(p=>p.cat===curFilter);
  document.getElementById('pgrid').innerHTML=list.map(p=>`<div class="pcard" id="pc-${p.id}">
    <div class="pimg"><img src="${p.img}" alt="${p.name}" loading="lazy"><span class="pcat">${p.cat}</span></div>
    <div class="pbody">
      <div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div>
      <div class="pprice">${fmt(p.price)}<small> /点</small></div>
      <div class="slbl">SIZE</div>
      <div class="swrap" id="sw-${p.id}">${p.sizes.map(s=>`<button class="sbtn" data-pid="${p.id}" data-sz="${s}" onclick="selSz(${p.id},'${s}')">${s}</button>`).join('')}</div>
      <div class="stk" id="stk-${p.id}"></div>
      <div class="qa-row">
        <div class="qctrl"><button class="qbtn" onclick="chgQ(${p.id},-1)">−</button><span class="qval" id="qv-${p.id}">1</span><button class="qbtn" onclick="chgQ(${p.id},1)">＋</button></div>
        <button class="btn-add" id="ba-${p.id}" onclick="addCart(${p.id})">カートに追加</button>
      </div>
    </div></div>`).join('');
  list.forEach(p=>selSz(p.id,p.sizes[0]));
}
function setFlt(c){curFilter=c;renderProds()}
function selSz(pid,sz){
  const p=PRODS.find(x=>x.id===pid);if(!p)return;
  document.querySelectorAll(`[data-pid="${pid}"]`).forEach(b=>b.classList.toggle('on',b.dataset.sz===sz));
  p._sz=sz;
  const stk=document.getElementById('stk-'+pid),ba=document.getElementById('ba-'+pid);
  if(p.showStock&&stk){const s=p.stock[sz]??0;stk.innerHTML=s===0?'<span class="stk-ng">在庫なし</span>':`<span class="stk-ok">在庫: ${s}点</span>`;if(ba){ba.disabled=s===0;ba.textContent=s===0?'在庫なし':'カートに追加';}}
  else if(stk){stk.innerHTML='';if(ba){ba.disabled=false;ba.textContent='カートに追加';}}
}
function chgQ(pid,d){const el=document.getElementById('qv-'+pid);if(el)el.textContent=Math.max(1,parseInt(el.textContent)+d)}
function addCart(pid){
  const p=PRODS.find(x=>x.id===pid);if(!p)return;
  const sz=p._sz||p.sizes[0],qty=parseInt(document.getElementById('qv-'+pid)?.textContent||1);
  const idx=cart.findIndex(i=>i.pid===pid&&i.size===sz);
  if(idx>=0)cart[idx].qty+=qty;else cart.push({pid,pname:p.name,size:sz,qty,price:p.price});
  updCart();toast(`${p.name}（${sz}）をカートに追加しました`);
}

function updCart(){
  const cnt=cart.reduce((s,i)=>s+i.qty,0),tot=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const b=document.getElementById('cbdg');b.style.display=cnt>0?'flex':'none';b.textContent=cnt;
  document.getElementById('ct-val').textContent=fmt(tot);
  const body=document.getElementById('cd-body');
  if(!cart.length){body.innerHTML='<div class="cart-empty"><div style="font-size:44px;margin-bottom:10px">🛒</div><p>カートが空です</p></div>';return;}
  body.innerHTML=cart.map((it,i)=>`<div class="ci"><div class="ci-info"><div class="ci-name">${it.pname}</div><div class="ci-meta">サイズ: ${it.size} ／ 数量: ${it.qty}</div><div class="ci-price">${fmt(it.price*it.qty)}</div></div><button class="btn-rm" onclick="rmCart(${i})">✕</button></div>`).join('');
}
function rmCart(i){cart.splice(i,1);updCart();toast('削除しました','err')}
function openCart(){document.getElementById('co').classList.add('open');document.getElementById('cd').classList.add('open')}
function closeCart(){document.getElementById('co').classList.remove('open');document.getElementById('cd').classList.remove('open')}

function openCheckout(){if(!cart.length){toast('カートが空です','err');return;}closeCart();showForm();}
function stepBar(cur){
  return`<div class="steps">${[['1','情報入力'],['2','確認'],['3','完了']].map(([n,l],i)=>{const s=i+1,cl=s<cur?'step done':s===cur?'step cur':'step';return`<div class="${cl}"><div class="step-num">${s<cur?'✓':n}</div><div class="step-lbl">${l}</div></div>`}).join('')}</div>`;
}
function showForm(){
  const cOpts=CATS.map(c=>`<option${oForm.cat===c?' selected':''}>${c}</option>`).join('');
  const pOpts=PAYS.map(p=>`<option${oForm.pay===p?' selected':''}>${p}</option>`).join('');
  showModal('ORDER INFO 📝',`${stepBar(1)}
    <div class="frow">
      <div class="fg"><label class="fl">保護者氏名 *</label><input class="fc" value="${oForm.pName}" placeholder="山田 花子" oninput="oForm.pName=this.value"></div>
      <div class="fg"><label class="fl">選手氏名 *</label><input class="fc" value="${oForm.sName}" placeholder="山田 一郎" oninput="oForm.sName=this.value"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">カテゴリー</label><select class="fc" onchange="oForm.cat=this.value">${cOpts}</select></div>
      <div class="fg"><label class="fl">支払方法</label><select class="fc" onchange="oForm.pay=this.value">${pOpts}</select></div>
    </div>
    <div class="fg"><label class="fl">メールアドレス *</label><input class="fc" type="email" value="${oForm.email}" placeholder="yamada@example.com" oninput="oForm.email=this.value"></div>
    <div class="fg"><label class="fl">備考</label><textarea class="fc" placeholder="ご要望があればお書きください" oninput="oForm.note=this.value">${oForm.note}</textarea></div>
    <button class="btn-f btn-red" onclick="goConfirm()">注文内容を確認する →</button>`);
}
function goConfirm(){
  if(!oForm.pName||!oForm.sName||!oForm.email){toast('必須項目を入力してください','err');return;}
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0);
  showModal('CONFIRM 確認',`${stepBar(2)}
    <div class="sbox">
      <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:2px;margin-bottom:8px">注文商品</div>
      ${cart.map(i=>`<div class="srow"><span>${i.pname}（${i.size}）× ${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
      <div class="srow tot"><span>合計</span><span class="s-tot-price">${fmt(tot)}</span></div>
    </div>
    <div class="sbox">
      <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:2px;margin-bottom:8px">注文者情報</div>
      ${[['保護者氏名',oForm.pName],['選手氏名',oForm.sName],['カテゴリー',oForm.cat],['メールアドレス',oForm.email],['支払方法',oForm.pay],...(oForm.note?[['備考',oForm.note]]:[])].map(([k,v])=>`<div class="irow"><span class="ik">${k}</span><span class="iv">${v}</span></div>`).join('')}
    </div>
    <button class="btn-f btn-gray" onclick="showForm()">← 戻る</button>
    <button class="btn-f btn-green" onclick="placeOrder()">✓ 注文を確定する</button>`);
}
async function placeOrder(){
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0),oid=genId();
  const order={id:oid,date:new Date().toISOString(),pName:oForm.pName,sName:oForm.sName,cat:oForm.cat,email:oForm.email,items:[...cart],total:tot,pay:oForm.pay,status:'未確認',note:oForm.note};
  orders.unshift(order);
  const itemTxt=cart.map(i=>`・${i.pname} ${i.size} ×${i.qty} ${fmt(i.price*i.qty)}`).join('\n');
  let sent=false;
  if(ejsCfg.pk&&ejsCfg.sid){
    try{
      emailjs.init({publicKey:ejsCfg.pk});
      const params={order_id:oid,date:fmtD(order.date),parent_name:order.pName,player_name:order.sName,category:order.cat,items:itemTxt,total:fmt(tot),payment:order.pay,note:order.note||'なし',to_email:order.email};
      const ps=[];
      if(ejsCfg.aTid&&ejsCfg.aEmail)ps.push(emailjs.send(ejsCfg.sid,ejsCfg.aTid,{...params,to_email:ejsCfg.aEmail}));
      if(ejsCfg.pTid)ps.push(emailjs.send(ejsCfg.sid,ejsCfg.pTid,params));
      await Promise.all(ps);sent=true;
    }catch(e){console.error(e);}
  }
  const prevCart=[...cart];
  cart=[];oForm={pName:'',sName:'',cat:'U13',email:'',pay:'現金払い',note:''};updCart();
  showModal('COMPLETE ✓',`${stepBar(3)}
    <div class="cpl-ic">✓</div>
    <div class="cpl-ttl">注文完了！</div>
    <p class="cpl-sub">ご注文ありがとうございます</p>
    <div class="oid-box">注文IDをメモしてください<span class="oid-val">${oid}</span></div>
    ${sent?'<div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:10px 13px;font-size:12px;color:#166534;margin-bottom:12px">📧 管理者・保護者の両方にメールを送信しました</div>':'<div class="note-box">⚠️ EmailJS未設定のためメール送信されていません。管理者ページ → EmailJS設定から設定できます。</div>'}
    <div class="sbox" style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:2px;margin-bottom:8px">注文内容</div>
      ${prevCart.map(i=>`<div class="srow"><span>${i.pname}（${i.size}）× ${i.qty}点</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
      <div class="srow tot"><span>合計</span><span class="s-tot-price">${fmt(tot)}</span></div>
    </div>
    <button class="btn-f btn-red" onclick="closeModal()">閉じる</button>`);
}

function printInvoice(oid){
  const o=orders.find(x=>x.id===oid);if(!o)return;
  document.getElementById('invoice-area').innerHTML=`
    <div class="inv-head"><div><div class="inv-club">⚽ SOCCER CLUB</div><div style="font-size:13px;color:#888;margin-top:4px">公式クラブショップ</div></div><div class="inv-title">請 求 書</div></div>
    <div class="inv-meta"><table>
      <tr><td>注文ID</td><td>${o.id}</td></tr>
      <tr><td>発行日</td><td>${fmtD(new Date().toISOString())}</td></tr>
      <tr><td>注文日</td><td>${fmtD(o.date)}</td></tr>
      <tr><td>保護者氏名</td><td>${o.pName} 様</td></tr>
      <tr><td>選手氏名</td><td>${o.sName}（${o.cat}）</td></tr>
      <tr><td>支払方法</td><td>${o.pay}</td></tr>
      ${o.note?`<tr><td>備考</td><td>${o.note}</td></tr>`:''}
    </table></div>
    <div class="inv-items"><table>
      <thead><tr><th>商品名</th><th>サイズ</th><th>数量</th><th>単価</th><th>小計</th></tr></thead>
      <tbody>${o.items.map(i=>`<tr><td>${i.pname}</td><td>${i.size}</td><td>${i.qty}点</td><td>${fmt(i.price)}</td><td>${fmt(i.price*i.qty)}</td></tr>`).join('')}</tbody>
    </table>
    <div class="inv-total">合計金額： <span>${fmt(o.total)}</span></div></div>
    <div class="inv-footer">※ お支払いは「${o.pay}」でお願いします。ご不明点はクラブまでお問い合わせください。</div>`;
  window.print();
}

function showModal(t,b){document.getElementById('m-ttl').textContent=t;document.getElementById('m-body').innerHTML=b;document.getElementById('mo').classList.add('open')}
function closeModal(){document.getElementById('mo').classList.remove('open')}
function showShop(){document.getElementById('shop-page').style.display='';document.getElementById('adm-sec').style.display='none';document.getElementById('adm-panel').style.display='none';document.getElementById('hdr').style.display=''}
function showAdminSec(){document.getElementById('shop-page').style.display='none';document.getElementById('adm-sec').style.display='block';document.getElementById('adm-panel').style.display='none';document.getElementById('hdr').style.display='none'}
function aLogin(){const pw=document.getElementById('apw').value;if(pw===ADM_PW){document.getElementById('adm-sec').style.display='none';document.getElementById('adm-panel').style.display='block';rDash();}else document.getElementById('aerr').textContent='パスワードが正しくありません'}
function aLogout(){document.getElementById('adm-sec').style.display='none';document.getElementById('adm-panel').style.display='none';document.getElementById('shop-page').style.display='';document.getElementById('hdr').style.display='';document.getElementById('apw').value=''}
function aTab(t,btn){
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  ['dash','orders','stats','cfg'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  if(t==='dash')rDash();if(t==='orders')rOrders();if(t==='stats')rStats();if(t==='cfg')rCfg();
}
function rDash(){
  const tot=orders.reduce((s,o)=>s+o.total,0),bySt=s=>orders.filter(o=>o.status===s).length;
  const cards=[{l:'総売上金額',v:fmt(tot),ic:'💰',c:'r'},{l:'総注文件数',v:orders.length+'件',ic:'📦',c:'b'},{l:'未確認件数',v:bySt('未確認')+'件',ic:'🔔',c:'y'},{l:'発注待ち件数',v:bySt('確認済み')+'件',ic:'⏳',c:'g'},{l:'受け渡し完了',v:bySt('受け渡し完了')+'件',ic:'✅',c:'gr'}];
  const recent=orders.slice(0,5).map(o=>`<div class="ocard" style="cursor:default"><div class="oc-top"><div><div class="oc-name">${o.pName} <span style="font-size:12px;color:#aaa;font-weight:400">/ ${o.sName}（${o.cat}）</span></div><div class="oc-meta">${fmtD(o.date)}</div></div>${bdg(sti(o.status))}</div><div class="oc-bot"><span class="oc-pay">${o.pay}</span><span class="oc-tot">${fmt(o.total)}</span></div></div>`).join('');
  document.getElementById('tab-dash').innerHTML=`<h2 style="font-family:var(--fd);font-size:28px;letter-spacing:2px;margin-bottom:18px">DASHBOARD</h2><div class="dc-grid">${cards.map(c=>`<div class="dc ${c.c}"><div class="dc-ic">${c.ic}</div><div class="dc-v">${c.v}</div><div class="dc-l">${c.l}</div></div>`).join('')}</div><h3 style="font-weight:700;font-size:14px;margin-bottom:10px">最近の注文</h3><div class="olist">${recent}</div>`;
}
function rOrders(){
  const filt=sfStatus==='すべて'?orders:orders.filter(o=>o.status===sfStatus);
  const sfBtns=['すべて',...STS].map(s=>`<button class="sf-btn${sfStatus===s?' on':''}" onclick="setSF('${s}')">${s}</button>`).join('');
  const cards=filt.map(o=>{
    const si=sti(o.status),isSel=selOid===o.id;
    const stBtns=STS.map((s,i)=>{const cur=o.status===s;return`<button class="sc-btn${cur?' cur':''}" style="${cur?`background:${ST_COL[i]};color:#fff`:''}" onclick="chgSt('${o.id}','${s}')">${s}</button>`}).join('');
    return`<div class="ocard${isSel?' sel':''}" onclick="togOD('${o.id}')">
      <div class="oc-top"><div><div class="oc-name">${o.pName} <span style="font-size:12px;color:#aaa;font-weight:400">/ ${o.sName}（${o.cat}）</span></div><div class="oc-meta">${fmtD(o.date)} · ${o.id}</div></div>${bdg(si)}</div>
      <div class="oc-items">${o.items.map(i=>`${i.pname}（${i.size}）×${i.qty}`).join('　')}</div>
      <div class="oc-bot"><span class="oc-pay">${o.pay}</span><span class="oc-tot">${fmt(o.total)}</span></div>
      <div class="odetail${isSel?' open':''}">
        <div class="irow"><span class="ik">📧</span><span class="iv">${o.email}</span></div>
        ${o.note?`<div class="irow"><span class="ik">備考</span><span class="iv">${o.note}</span></div>`:''}
        <div class="sbox" style="margin-top:12px">
          <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:8px">注文明細</div>
          ${o.items.map(i=>`<div class="srow"><span>${i.pname}（${i.size}）× ${i.qty}点</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
          <div class="srow tot"><span>合計</span><span class="s-tot-price">${fmt(o.total)}</span></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:#555;margin:10px 0 6px">ステータス変更:</div>
        <div class="sc-btns">${stBtns}</div>
        <button class="btn-inv" onclick="event.stopPropagation();printInvoice('${o.id}')">🖨️ 請求書を印刷する</button>
      </div></div>`;
  }).join('');
  document.getElementById('tab-orders').innerHTML=`<h2 style="font-family:var(--fd);font-size:28px;letter-spacing:2px;margin-bottom:16px">ORDERS</h2><div class="sf-wrap">${sfBtns}</div><div class="olist">${cards||'<p style="color:#aaa;padding:20px 0">注文がありません</p>'}</div>`;
}
function setSF(s){sfStatus=s;rOrders()}
function togOD(id){selOid=selOid===id?null:id;rOrders()}
function chgSt(id,s){orders=orders.map(o=>o.id===id?{...o,status:s}:o);toast('ステータスを更新しました');rOrders()}
function rStats(){
  const html=PRODS.map(p=>{
    const sc={};p.sizes.forEach(s=>sc[s]=0);
    orders.forEach(o=>o.items.forEach(i=>{if(i.pid===p.id)sc[i.size]=(sc[i.size]||0)+i.qty}));
    const tq=Object.values(sc).reduce((a,b)=>a+b,0);
    return`<div class="stcard"><div class="stcard-hd"><img class="sthumb" src="${p.img}" alt="${p.name}"><div style="flex:1"><div class="stname">${p.name}</div><div class="sttot">注文合計: ${tq}点 ／ ${fmt(p.price*tq)}</div></div><label class="stk-tog"><input type="checkbox"${stockMap[p.id]?' checked':''} onchange="togStk(${p.id},this.checked)">在庫表示</label></div><div class="stsizes">${p.sizes.map(s=>`<div class="stsz"><div class="stsz-l">${s}</div><div class="stsz-v">${sc[s]||0}</div><div class="stsz-u">点</div>${stockMap[p.id]?`<div class="stsz-stk">在庫:${p.stock[s]??0}</div>`:''}</div>`).join('')}</div></div>`;
  }).join('');
  document.getElementById('tab-stats').innerHTML=`<h2 style="font-family:var(--fd);font-size:28px;letter-spacing:2px;margin-bottom:16px">STATS</h2>${html}`;
}
function togStk(pid,v){stockMap[pid]=v;rStats()}
function rCfg(){
  document.getElementById('tab-cfg').innerHTML=`<h2 style="font-family:var(--fd);font-size:28px;letter-spacing:2px;margin-bottom:6px">EMAILJS設定</h2>
    <p style="color:#888;font-size:13px;margin-bottom:18px"><a href="https://www.emailjs.com" target="_blank" style="color:var(--red)">emailjs.com</a> で無料アカウントを作成し、以下を入力してください。</p>
    <div class="ejbox"><div class="ej-ttl">🔑 基本設定 <span class="ej-saved"${ejsCfg.pk?' style="display:inline"':''}>保存済み ✓</span></div>
      <div class="frow"><div class="fg"><label class="fl">Public Key</label><input class="fc" id="ej-pk" value="${ejsCfg.pk||''}" placeholder="user_xxxxxxxxx"></div><div class="fg"><label class="fl">Service ID</label><input class="fc" id="ej-sid" value="${ejsCfg.sid||''}" placeholder="service_xxxxxxx"></div></div></div>
    <div class="ejbox"><div class="ej-ttl">📧 管理者通知</div>
      <div class="frow"><div class="fg"><label class="fl">管理者メールアドレス</label><input class="fc" id="ej-ae" value="${ejsCfg.aEmail||''}" placeholder="admin@example.com"></div><div class="fg"><label class="fl">管理者用 Template ID</label><input class="fc" id="ej-at" value="${ejsCfg.aTid||''}" placeholder="template_xxxxxxx"></div></div></div>
    <div class="ejbox"><div class="ej-ttl">📨 保護者確認メール</div>
      <div class="fg"><label class="fl">保護者用 Template ID</label><input class="fc" id="ej-pt" value="${ejsCfg.pTid||''}" placeholder="template_xxxxxxx"></div>
      <div style="background:#f8f8f8;border-radius:8px;padding:11px;font-size:12px;color:#666;line-height:1.9;margin-top:6px"><strong>テンプレート変数：</strong><br>{{order_id}} {{date}} {{parent_name}} {{player_name}} {{category}} {{items}} {{total}} {{payment}} {{note}} {{to_email}}</div></div>
    <button class="btn-f btn-red" onclick="saveCfg()">設定を保存する</button>`;
}
function saveCfg(){
  ejsCfg={pk:document.getElementById('ej-pk').value.trim(),sid:document.getElementById('ej-sid').value.trim(),aEmail:document.getElementById('ej-ae').value.trim(),aTid:document.getElementById('ej-at').value.trim(),pTid:document.getElementById('ej-pt').value.trim()};
  localStorage.setItem('ejsCfg',JSON.stringify(ejsCfg));toast('EmailJS設定を保存しました');rCfg();
}
renderProds();updCart();
</script>
</body>
</html>
